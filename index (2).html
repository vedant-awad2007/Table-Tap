<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TableTap</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ── Admin palette ── */
  --ab:#F1F5F9;--as:#FFFFFF;--an:#0F172A;--asd:#FFFFFF;
  --ac:#2563EB;--acl:#EFF6FF;--ach:#1D4ED8;
  --abr:#E2E8F0;--am:#64748B;--at:#0F172A;--at2:#334155;
  /* ── Status ── */
  --pbg:#FFF7ED;--pt:#C2410C;--pbr:#FED7AA;
  --prb:#FEFCE8;--prt:#A16207;--prr:#FEF08A;
  --rdb:#F0FDF4;--rdt:#15803D;--rdbr:#BBF7D0;
  --db:#F8FAFC;--dt:#475569;--dbr:#E2E8F0;
  /* ── Customer palette ── */
  --cb:#FFFBF5;--cn:#1C1108;--ca:#D97706;--cal:#FEF3C7;
  --cbr:#F0E6D3;--cm:#9C8060;--cs:#FFFFFF;--ct:#1C1108;
  /* ── Shared ── */
  --red:#DC2626;--redl:#FEF2F2;
  --grn:#16A34A;--grnl:#F0FDF4;
  --r:10px;--rl:16px;--rxl:24px;
  --sh1:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --sh2:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -1px rgba(0,0,0,.05);
  --sh3:0 10px 25px -3px rgba(0,0,0,.08),0 4px 6px -2px rgba(0,0,0,.04);
}
html,body{font-family:'Inter',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;background:var(--ab)}
button{cursor:pointer;font-family:'Inter',sans-serif}
input,select,textarea{font-family:'Inter',sans-serif}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:var(--r);font-size:13.5px;font-weight:500;border:none;transition:all .18s;cursor:pointer}
.btn-primary{background:var(--at);color:#fff;box-shadow:var(--sh1)}.btn-primary:hover{background:#1e293b;box-shadow:var(--sh2)}
.btn-amber{background:var(--ca);color:#fff;box-shadow:var(--sh1)}.btn-amber:hover{background:#b45309}
.btn-outline{background:transparent;border:1.5px solid var(--abr);color:var(--at2)}.btn-outline:hover{border-color:#94A3B8;background:var(--ab)}
.btn-danger{background:var(--redl);color:var(--red);border:1px solid #FECACA}.btn-danger:hover{background:#fee2e2}
.btn-green{background:var(--grn);color:#fff}.btn-green:hover{background:#15803d}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:8px}
.btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}

/* FORM */
.field{margin-bottom:18px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--am);margin-bottom:6px;text-transform:uppercase;letter-spacing:.07em}
.field input,.field select,.field textarea{width:100%;padding:10px 14px;border:1.5px solid var(--abr);border-radius:var(--r);font-size:14px;background:#fff;color:var(--at);outline:none;transition:border-color .15s,box-shadow .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.field textarea{resize:vertical;min-height:80px}
.field-hint{font-size:11px;color:var(--am);margin-top:5px}

/* SETUP */
.setup-page{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;background:#0F172A;padding:30px 20px;overflow-y:auto}
.setup-card{background:#fff;border-radius:var(--rxl);padding:40px 36px;width:100%;max-width:640px;margin:auto;box-shadow:var(--sh3)}
.setup-logo{font-family:'Playfair Display',serif;font-size:34px;text-align:center;margin-bottom:6px;color:var(--at)}
.setup-logo span{color:var(--ca);font-style:italic}

/* AUTH / LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0F172A 0%,#1E293B 60%,#0F172A 100%);padding:20px}
.login-card{background:#fff;border-radius:var(--rxl);padding:44px 40px;width:100%;max-width:440px;box-shadow:0 25px 50px -12px rgba(0,0,0,.45)}
.login-logo{font-family:'Playfair Display',serif;font-size:36px;text-align:center;margin-bottom:4px;color:var(--at)}
.login-logo span{color:var(--ca);font-style:italic}
.login-sub{text-align:center;color:var(--am);font-size:13.5px;margin-bottom:30px;line-height:1.5}
.login-err{background:var(--redl);color:var(--red);padding:11px 14px;border-radius:var(--r);font-size:13px;margin-bottom:16px;border:1px solid #FECACA}

/* ── AUTH / REGISTER PAGES ── */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0F172A 0%,#1E293B 60%,#0F172A 100%);padding:20px;overflow-y:auto}
.auth-card{background:#fff;border-radius:var(--rxl);padding:44px 40px;width:100%;max-width:460px;box-shadow:0 25px 50px -12px rgba(0,0,0,.45)}
.auth-logo{font-family:'Playfair Display',serif;font-size:36px;text-align:center;margin-bottom:4px;color:var(--at)}
.auth-logo span{color:var(--ca);font-style:italic}
.auth-sub{text-align:center;color:var(--am);font-size:13.5px;margin-bottom:28px;line-height:1.5}
.auth-err{background:var(--redl);color:var(--red);padding:11px 14px;border-radius:var(--r);font-size:13px;margin-bottom:16px;border:1px solid #FECACA}
.auth-ok{background:var(--grnl);color:var(--grn);padding:11px 14px;border-radius:var(--r);font-size:13px;margin-bottom:16px;border:1px solid #BBF7D0}
.auth-divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--am);font-size:12px}
.auth-divider:before,.auth-divider:after{content:'';flex:1;height:1px;background:var(--abr)}
.auth-switch{text-align:center;margin-top:20px;font-size:13px;color:var(--am)}
.auth-switch button{background:none;border:none;color:var(--ac);font-weight:600;cursor:pointer;font-size:13px;text-decoration:underline;font-family:'Inter',sans-serif}
.auth-section-label{background:var(--acl);border:1px solid #BFDBFE;border-radius:var(--r);padding:10px 14px;font-size:12.5px;color:var(--ac);font-weight:600;margin:20px 0 16px}
/* Settings page */
.settings-section{background:var(--as);border:1px solid var(--abr);border-radius:var(--rl);padding:24px;margin-bottom:16px;box-shadow:var(--sh1)}
.settings-section-title{font-size:14px;font-weight:600;color:var(--at);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--abr);display:flex;align-items:center;gap:8px}

/* ADMIN NAV */
.admin-nav{
  background:var(--an);color:#fff;padding:0 16px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,.07)
}
.nav-brand{font-family:'Playfair Display',serif;font-size:21px;color:#fff;display:flex;align-items:center;gap:8px}
.nav-brand span{color:var(--ca);font-style:italic}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-email{font-size:12px;color:rgba(255,255,255,.45);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-logout{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.75);padding:6px 12px;border-radius:8px;
  font-size:12px;cursor:pointer;transition:all .18s;font-family:'Inter',sans-serif;white-space:nowrap
}
.btn-logout:hover{background:rgba(255,255,255,.16)}
.hamburger{
  background:transparent;border:none;color:rgba(255,255,255,.75);
  font-size:22px;width:36px;height:36px;display:none;cursor:pointer;
  border-radius:8px;align-items:center;justify-content:center
}

/* ADMIN LAYOUT */
.admin-body{display:flex;height:calc(100vh - 56px);position:relative;background:var(--ab)}
.sidebar{
  width:220px;background:#fff;border-right:1px solid var(--abr);
  padding:12px 8px;flex-shrink:0;overflow-y:auto;transition:transform .25s
}
.sidebar-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:10px;font-size:13.5px;color:var(--at2);cursor:pointer;
  transition:all .15s;border:none;background:none;width:100%;
  text-align:left;margin-bottom:1px;font-weight:500
}
.sidebar-item:hover{background:var(--ab);color:var(--at)}
.sidebar-item.active{background:var(--acl);color:var(--ac);font-weight:600}
.sidebar-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.sidebar-item.active .sidebar-icon{opacity:1}
.sidebar-badge{
  margin-left:auto;background:var(--red);color:#fff;
  border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700
}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150}
.main-content{flex:1;padding:24px 28px;overflow-y:auto}

/* MOBILE TABS — hidden, replaced by drawer */
.mobile-tabs{display:none}
.mob-tab{display:none}
.mob-tab-icon{display:none}

/* Mobile breadcrumb — shows current section below nav */
.mob-breadcrumb{
  display:none;align-items:center;gap:8px;
  padding:10px 0 14px;
  font-size:15px;font-weight:700;color:var(--at);
  border-bottom:1px solid var(--abr);margin-bottom:16px
}

/* PAGE HEADER */
.page-header{margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--abr)}
.page-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;color:var(--at);margin-bottom:2px}
.page-sub{color:var(--am);font-size:13px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-card{
  background:var(--as);border:1px solid var(--abr);border-radius:var(--rl);
  padding:16px 14px;box-shadow:var(--sh1);transition:box-shadow .2s
}
.stat-card:hover{box-shadow:var(--sh2)}
.stat-icon{font-size:20px;margin-bottom:8px;display:block}
.stat-num{font-size:30px;font-weight:700;color:var(--at);display:block;line-height:1;letter-spacing:-.03em}
.stat-label{font-size:11px;color:var(--am);margin-top:5px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}

/* CARDS */
.card{background:var(--as);border:1px solid var(--abr);border-radius:var(--rl);padding:22px 24px;margin-bottom:16px;box-shadow:var(--sh1)}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.card-title{font-size:15px;font-weight:600;color:var(--at)}

/* TABLE */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--rl);border:1px solid var(--abr)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--ab)}
th{text-align:left;padding:11px 16px;border-bottom:1px solid var(--abr);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--am);font-weight:700;white-space:nowrap}
td{padding:13px 16px;border-bottom:1px solid var(--abr);vertical-align:middle;color:var(--at2)}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#F8FAFF}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;border:1px solid transparent;text-transform:capitalize}
.b-pending{background:var(--pbg);color:var(--pt);border-color:var(--pbr)}
.b-preparing{background:var(--prb);color:var(--prt);border-color:var(--prr)}
.b-ready{background:var(--rdb);color:var(--rdt);border-color:var(--rdbr)}
.b-delivered{background:var(--db);color:var(--dt);border-color:var(--dbr)}

/* ORDER CARDS */
.order-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
.order-card{background:var(--as);border:1px solid var(--abr);border-radius:var(--rl);padding:18px 20px;box-shadow:var(--sh1);transition:box-shadow .2s;overflow:hidden;position:relative}
.order-card:hover{box-shadow:var(--sh2)}
.order-card-stripe{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--rl) var(--rl) 0 0}
.order-id-txt{font-size:11px;font-weight:700;color:var(--am);text-transform:uppercase;letter-spacing:.07em}
.order-tbl{font-size:22px;font-weight:700;color:var(--at);margin:6px 0 10px;letter-spacing:-.02em}
.order-items-txt{font-size:12.5px;color:var(--am);line-height:1.7;margin-bottom:8px}
.order-foot{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--abr);padding-top:12px;margin-top:12px}
.order-price{font-size:20px;font-weight:700;color:var(--at);letter-spacing:-.02em}

/* MENU GRID */
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.menu-card{background:var(--as);border:1px solid var(--abr);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh1);transition:box-shadow .2s}
.menu-card:hover{box-shadow:var(--sh2)}
.menu-img{height:130px;background:linear-gradient(135deg,#FEF9C3,#FDE68A);display:flex;align-items:center;justify-content:center;font-size:50px}
.menu-body{padding:13px}
.menu-cat{font-size:10px;color:var(--ac);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.menu-name{font-weight:600;font-size:14.5px;color:var(--at);margin-bottom:3px}
.menu-desc{font-size:11.5px;color:var(--am);line-height:1.5;margin-bottom:10px}
.menu-foot{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--abr)}
.menu-price{font-size:18px;font-weight:700;color:var(--at);letter-spacing:-.02em}

/* TOGGLE */
.toggle{position:relative;width:40px;height:22px;cursor:pointer;display:inline-block;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.tog-sl{position:absolute;inset:0;background:#CBD5E1;border-radius:11px;transition:.25s}
.tog-sl:before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked+.tog-sl{background:var(--grn)}
.toggle input:checked+.tog-sl:before{transform:translateX(18px)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:500;display:flex;align-items:flex-end;justify-content:center;padding:0}
.modal{background:#fff;border-radius:var(--rxl) var(--rxl) 0 0;padding:12px 28px 28px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;box-shadow:0 -20px 60px rgba(0,0,0,.15)}
.modal-handle{width:40px;height:4px;background:var(--abr);border-radius:2px;margin:0 auto 20px}
.modal-title{font-family:'Playfair Display',serif;font-size:24px;color:var(--at);margin-bottom:22px}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:22px;padding-top:18px;border-top:1px solid var(--abr)}

/* FILTERS */
.filters{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.filters input,.filters select{padding:9px 14px;border:1.5px solid var(--abr);border-radius:var(--r);font-size:13px;background:#fff;outline:none;color:var(--at)}
.filters input:focus,.filters select:focus{border-color:var(--ac)}
.cat-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.cat-pill{padding:6px 16px;border-radius:20px;border:1.5px solid var(--abr);font-size:12.5px;font-weight:500;background:transparent;cursor:pointer;transition:all .15s;white-space:nowrap;color:var(--at2)}
.cat-pill:hover{border-color:#94A3B8;background:var(--ab)}
.cat-pill.on{background:var(--ac);color:#fff;border-color:var(--ac)}

/* EMPTY / LOADING */
.empty{text-align:center;padding:56px 20px;color:var(--am)}
.empty-icon{font-size:44px;margin-bottom:12px;opacity:.55}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--am);font-size:14px;gap:12px}
.spinner{width:22px;height:22px;border:2.5px solid var(--abr);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* QR */
.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:14px;margin-top:18px}
.qr-card{background:var(--as);border:1px solid var(--abr);border-radius:var(--rl);padding:18px;text-align:center;box-shadow:var(--sh1)}

/* KITCHEN */
.kit-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.kit-col-hd{font-weight:600;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:8px;color:var(--at)}
.kit-card{border-radius:var(--rl);padding:16px;margin-bottom:12px;border:1px solid transparent;box-shadow:var(--sh1)}
.kit-pending{background:var(--pbg);border-color:var(--pbr)}
.kit-preparing{background:var(--prb);border-color:var(--prr)}
.kit-ready{background:var(--rdb);border-color:var(--rdbr)}



/* ══ SUBSCRIPTION PAYWALL ══════════════════════════════════════════ */
.paywall-wrap{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  background:linear-gradient(160deg,#0F172A 0%,#1E293B 100%);
  padding:24px 20px 40px;overflow-y:auto
}
.paywall-logo{
  font-family:'Playfair Display',serif;
  font-size:32px;color:#fff;margin-bottom:4px;text-align:center
}
.paywall-logo span{color:#F59E0B;font-style:italic}
.paywall-card{
  width:100%;max-width:440px;
  background:#fff;border-radius:24px;
  overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.5)
}
.paywall-header{
  background:linear-gradient(135deg,#1C1108,#2C1A0E);
  padding:28px 28px 24px;text-align:center
}
.paywall-plan{
  font-size:11px;font-weight:700;color:#F59E0B;
  text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px
}
.paywall-price{
  font-family:'Playfair Display',serif;
  font-size:52px;font-weight:700;color:#fff;line-height:1;
  letter-spacing:-.03em
}
.paywall-price sup{font-size:24px;vertical-align:top;margin-top:8px;color:#F59E0B}
.paywall-price-sub{font-size:13px;color:rgba(255,255,255,.5);margin-top:6px}
.paywall-body{padding:24px 28px}
.paywall-feature{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;font-size:14px;color:#374151;
  border-bottom:1px solid #F3F4F6
}
.paywall-feature:last-child{border-bottom:none}
.paywall-feature-icon{font-size:18px;width:28px;flex-shrink:0;text-align:center}
.paywall-divider{
  border:none;border-top:2px dashed #E5E7EB;margin:20px 0;
}
.paywall-upi-section{text-align:center}
.paywall-upi-title{
  font-size:13px;font-weight:700;color:#374151;
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px
}
.paywall-qr-wrap{
  display:inline-block;background:#F8FAFC;
  border:1px solid #E5E7EB;border-radius:16px;
  padding:16px;margin-bottom:12px
}
.paywall-qr-wrap img{
  width:180px;height:180px;border-radius:8px;display:block
}
.paywall-upi-id{
  font-size:13px;color:#6B7280;margin-bottom:16px;
  font-family:'Inter',sans-serif
}
.paywall-upi-id strong{color:#111;font-weight:700}
.paywall-pending{
  background:#FEF3C7;border:1.5px solid #FCD34D;
  border-radius:14px;padding:14px 16px;
  font-size:13px;color:#92400E;text-align:center;line-height:1.6
}
.paywall-pending-icon{font-size:28px;margin-bottom:8px}
.paywall-refresh{
  margin-top:12px;padding:"8px 20px";
  background:#D97706;color:#fff;border:none;
  border-radius:8px;font-size:13px;font-weight:700;
  cursor:pointer;font-family:'Inter',sans-serif;padding:8px 20px
}
.paywall-logout{
  margin-top:16px;font-size:12px;color:rgba(255,255,255,.4);
  text-align:center
}
.paywall-logout button{
  background:none;border:none;color:rgba(255,255,255,.4);
  text-decoration:underline;cursor:pointer;font-size:12px;
  font-family:'Inter',sans-serif
}
/* Expired banner */
.sub-expired-banner{
  background:linear-gradient(135deg,#7F1D1D,#991B1B);
  color:#fff;padding:10px 16px;
  display:flex;align-items:center;gap:10px;
  font-size:13px;font-weight:600;flex-shrink:0
}

/* ══════════════════════════════════════════
   LIVE ORDERS — redesigned for high volume
══════════════════════════════════════════ */
/* Status lane headers */
.lo-board{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start}
.lo-lane{background:var(--ab);border-radius:var(--rl);overflow:hidden;min-height:120px}
.lo-lane-head{
  padding:12px 16px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:2
}
.lo-lane-head.pending{background:#FFF3E0;border-bottom:2px solid #FB8C00}
.lo-lane-head.preparing{background:#FFFDE7;border-bottom:2px solid #FDD835}
.lo-lane-head.ready{background:#E8F5E9;border-bottom:2px solid #43A047}
.lo-lane-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.lo-lane-count{
  font-size:11px;font-weight:800;
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;color:#fff
}
.lo-lane-count.pending{background:#FB8C00}
.lo-lane-count.preparing{background:#F9A825}
.lo-lane-count.ready{background:#43A047}
.lo-lane-body{padding:8px}

/* Individual order ticket */
.lo-ticket{
  background:#fff;border-radius:var(--r);margin-bottom:8px;
  overflow:hidden;box-shadow:var(--sh1);
  border:1px solid var(--abr);transition:box-shadow .15s
}
.lo-ticket:hover{box-shadow:var(--sh2)}
.lo-ticket-top{padding:10px 12px 6px;display:flex;align-items:center;justify-content:space-between;gap:6px}
.lo-table-num{
  font-size:20px;font-weight:800;color:var(--at);
  letter-spacing:-.02em;line-height:1
}
.lo-time-chip{
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;
  white-space:nowrap;flex-shrink:0
}
.lo-time-chip.fresh{background:#E8F5E9;color:#2E7D32}
.lo-time-chip.mid{background:#FFF3E0;color:#E65100}
.lo-time-chip.old{background:#FFEBEE;color:#C62828;animation:urgPulse 1.5s infinite}
@keyframes urgPulse{0%,100%{opacity:1}50%{opacity:.6}}
.lo-items{
  padding:0 12px 8px;font-size:12px;color:var(--am);
  line-height:1.8;border-bottom:1px solid var(--abr)
}
.lo-item-row{display:flex;align-items:baseline;gap:4px}
.lo-item-qty{
  font-size:11px;font-weight:800;color:#fff;
  background:var(--at2);border-radius:4px;
  padding:0 5px;flex-shrink:0;line-height:1.6
}
.lo-item-name{color:var(--at2);font-weight:500}
.lo-ticket-foot{
  padding:8px 12px;display:flex;align-items:center;
  justify-content:space-between;gap:8px
}
.lo-total{font-size:13px;font-weight:700;color:var(--am)}
.lo-action-btn{
  flex:1;padding:8px 0;border:none;border-radius:8px;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:4px
}
.lo-action-btn.pending{background:#FB8C00;color:#fff}
.lo-action-btn.pending:hover{background:#E65100}
.lo-action-btn.preparing{background:#F9A825;color:#fff}
.lo-action-btn.preparing:hover{background:#F57F17}
.lo-action-btn.ready{background:#43A047;color:#fff}
.lo-action-btn.ready:hover{background:#2E7D32}

/* Empty lane */
.lo-empty{
  text-align:center;padding:24px 12px;
  color:var(--am);font-size:12px
}

/* Top summary bar */
.lo-summary{
  display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap
}
.lo-summary-chip{
  display:flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;
  border:1px solid transparent
}

/* Mobile — stack lanes */
@media(max-width:768px){
  /* Admin layout — sidebar becomes drawer */
  .sidebar{position:fixed;top:60px;left:0;bottom:0;z-index:160;
    transform:translateX(-100%);box-shadow:8px 0 30px rgba(0,0,0,.12)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{display:block}
  .hamburger{display:flex}
  /* Show breadcrumb on mobile, hide on desktop */
  .mob-breadcrumb{display:flex}
  /* Main content — full width, padding for tab bar */
  .main-content{padding:16px 14px}
  /* Hide sidebar email in nav */
  .nav-email{display:none}
  /* Stack stats */
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  /* Stack kanban lanes */
  .lo-board{grid-template-columns:1fr}
  /* Stack order cards */
  .order-cards{grid-template-columns:1fr}
  /* Stack menu grid */
  .menu-grid{grid-template-columns:repeat(2,1fr)}
  /* Admin body full height */
  .admin-body{height:calc(100vh - 56px)}
  /* Auth cards smaller padding */
  .auth-card{padding:32px 20px}
  .login-card{padding:32px 20px}
}
@media(max-width:420px){
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .stat-card{padding:14px 12px}
  .stat-num{font-size:28px}
  .menu-grid{grid-template-columns:1fr}
  .main-content{padding:12px 10px}
  .mob-tab{font-size:9px;padding:6px 0}
  .mob-tab-icon{font-size:18px}
  /* Smaller modal on tiny screens */
  .modal{max-height:95vh;border-radius:20px 20px 0 0}
}

/* TOAST */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--at);color:#fff;padding:12px 22px;border-radius:var(--rl);font-size:13.5px;z-index:9999;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.25);animation:tIn .25s ease;font-weight:500}
@keyframes tIn{from{opacity:0;top:4px}to{opacity:1;top:16px}}

/* ══════════════════════════════════════════════════════
   KITCHEN VIEW — clean, minimal, with polished effects
══════════════════════════════════════════════════════ */
.st-wrap{
  min-height:100vh;display:flex;flex-direction:column;
  font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;
  background:#F5F5F5
}

/* Nav */
.st-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px;background:#fff;
  border-bottom:1px solid #EBEBEB;
  position:sticky;top:0;z-index:20;flex-shrink:0
}
.st-nav-brand{font-family:'Playfair Display',serif;font-size:21px;color:#111;line-height:1}
.st-nav-brand span{color:#D97706;font-style:italic}
.st-station-label{font-size:11px;color:#999;margin-top:2px;letter-spacing:.05em;text-transform:uppercase}
.st-nav-right{display:flex;align-items:center;gap:6px}
.st-live-dot{width:7px;height:7px;border-radius:50%;background:#22C55E;animation:kPulse 2s infinite}
@keyframes kPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.st-live-txt{font-size:11px;font-weight:700;color:#22C55E;text-transform:uppercase;letter-spacing:.06em}

/* Three tabs */
.st-tabs{
  display:flex;background:#fff;
  border-bottom:1px solid #EBEBEB;
  flex-shrink:0;position:sticky;top:55px;z-index:19
}
.st-tab{
  flex:1;padding:12px 6px;border:none;background:none;
  cursor:pointer;font-family:'Inter',sans-serif;
  font-size:13px;font-weight:600;color:#AAA;
  border-bottom:2.5px solid transparent;
  transition:color .18s,border-color .18s;
  display:flex;align-items:center;justify-content:center;gap:5px;
  position:relative
}
.st-tab:active{background:#F9F9F9}
.st-tab.active{color:#111;border-bottom-color:#111}
.st-tab-badge{
  background:#EBEBEB;color:#666;border-radius:20px;
  padding:1px 7px;font-size:11px;font-weight:700;
  min-width:22px;text-align:center;transition:all .18s
}
.st-tab.active .st-tab-badge{background:#111;color:#fff}

/* New order ping on badge */
@keyframes badgePing{
  0%{transform:scale(1)}
  30%{transform:scale(1.4)}
  100%{transform:scale(1)}
}
.st-tab-badge.ping{animation:badgePing .4s ease}

/* Body */
.st-body{flex:1;overflow-y:auto;padding:12px 12px 48px;-webkit-overflow-scrolling:touch}

/* Empty */
.st-empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:60px 24px;text-align:center
}
.st-empty-icon{font-size:52px;line-height:1;margin-bottom:14px}
.st-empty-title{font-size:19px;font-weight:700;color:#333;margin-bottom:5px}
.st-empty-sub{font-size:13.5px;color:#AAA;line-height:1.5}

/* Order card */
.st-order{
  background:#fff;border-radius:16px;margin-bottom:10px;
  overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.05);
  border:1px solid #EBEBEB;
  transition:transform .15s,box-shadow .15s
}
.st-order:active{transform:scale(.995)}
.st-order-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 10px
}
.st-table-block{display:flex;align-items:baseline;gap:8px}
.st-table-label{
  font-size:11px;font-weight:700;color:#BBB;
  letter-spacing:.1em;text-transform:uppercase
}
.st-table-num{
  font-size:52px;font-weight:900;color:#111;
  line-height:1;letter-spacing:-.04em
}
.st-time-block{text-align:right}
.st-time-val{
  font-size:12px;font-weight:700;padding:4px 10px;
  border-radius:20px;display:inline-block;white-space:nowrap
}
.st-time-val.fresh{background:#F0FDF4;color:#16A34A}
.st-time-val.mid  {background:#FFF7ED;color:#D97706}
.st-time-val.old  {background:#FEF2F2;color:#DC2626;animation:urgPulse 1.4s infinite}
.st-order-id-txt{font-size:9px;color:#DDD;margin-top:3px;letter-spacing:.03em}

/* Items */
.st-items-list{padding:0 14px 8px;border-top:1px solid #F5F5F5}
.st-item-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 0;border-bottom:1px solid #F5F5F5
}
.st-item-row:last-child{border-bottom:none}
.st-qty-badge{
  min-width:34px;height:34px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:900;color:#111;
  background:#F5F5F5;flex-shrink:0
}
.st-item-name-txt{flex:1;font-size:17px;font-weight:600;color:#111;line-height:1.25}

/* Action button — the main interaction, needs to feel satisfying */
.st-action-wrap{padding:6px 12px 14px}
.st-action-btn{
  width:100%;padding:16px;border:none;border-radius:14px;
  font-size:16px;font-weight:800;cursor:pointer;
  font-family:'Inter',sans-serif;letter-spacing:.01em;
  position:relative;overflow:hidden;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
  color:#fff;
  /* Smooth press */
  transition:transform .12s,box-shadow .12s,filter .12s
}
/* Ripple on tap */
.st-action-btn::after{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,.25);
  border-radius:inherit;
  transform:scale(0);opacity:1;
  transition:transform .4s ease,opacity .4s ease
}
.st-action-btn:active::after{transform:scale(2);opacity:0}
.st-action-btn:active{transform:scale(.97);filter:brightness(.9)}

/* Button colours — minimal, one solid colour each */
.st-action-btn.pending  {background:#1A1A1A;box-shadow:0 4px 14px rgba(0,0,0,.25)}
.st-action-btn.preparing{background:#D97706;box-shadow:0 4px 14px rgba(217,119,6,.35)}
.st-action-btn.ready    {background:#16A34A;box-shadow:0 4px 14px rgba(22,163,74,.35)}
.st-action-btn.pending:hover  {box-shadow:0 6px 20px rgba(0,0,0,.35)}
.st-action-btn.preparing:hover{box-shadow:0 6px 20px rgba(217,119,6,.5)}
.st-action-btn.ready:hover    {box-shadow:0 6px 20px rgba(22,163,74,.5)}

/* Payment notification */
.st-pay-banner{
  margin:10px 12px 0;padding:13px 14px;
  background:#F0FDF4;border:1px solid #BBF7D0;
  border-radius:12px;display:flex;align-items:center;gap:12px;
  animation:slideDown .3s ease
}
.st-pay-banner-icon{font-size:22px;flex-shrink:0}
.st-pay-banner-text{flex:1}
.st-pay-banner-title{font-size:13.5px;font-weight:700;color:#15803D;margin-bottom:1px}
.st-pay-banner-sub{font-size:12px;color:#16A34A}
.st-pay-banner-close{
  background:transparent;border:none;color:#86EFAC;
  font-size:16px;cursor:pointer;padding:4px;line-height:1
}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

@media(min-width:480px){
  .st-table-num{font-size:60px}
  .st-item-name-txt{font-size:19px}
  .st-action-btn{font-size:17px;padding:18px}
}




/* ── Kitchen table grid ── */
/* ── Table grid — fills full screen, no scroll ── */
.kt-grid{
  flex:1;
  display:grid;
  /* columns auto-calculated by JS via inline style */
  gap:10px;
  padding:10px 12px 12px;
  overflow:hidden
}

/* Table box — square, fills its cell */
.kt-box{
  position:relative;
  width:100%;height:100%;
  border-radius:14px;
  border:2px solid #E9ECEF;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;
  background:#F9F9F9;
  transition:transform .12s,border-color .2s,background .2s;
  -webkit-tap-highlight-color:transparent;
  padding:0;outline:none;
  touch-action:manipulation
}
.kt-box:not(:disabled):hover{transform:scale(1.04)}
.kt-box:not(:disabled):active{transform:scale(.92)}
.kt-box:disabled{cursor:default}

/* Table number */
.kt-num{
  font-size:clamp(14px,3.5vw,32px);
  font-weight:900;line-height:1;letter-spacing:-.03em
}
/* Status label */
.kt-label{
  font-size:clamp(8px,1.8vw,11px);font-weight:700;
  text-transform:uppercase;letter-spacing:.05em;
  margin-top:2px;opacity:.85
}

/* Order count badge — top right */
.kt-badge{
  position:absolute;top:-7px;right:-7px;
  min-width:20px;height:20px;
  padding:0 5px;
  border-radius:10px;
  background:#111;color:#fff;
  font-size:11px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  border:2px solid #F5F5F5;
  z-index:2;line-height:1
}

/* ── Blink when new order arrives — keeps going until chef taps ── */
@keyframes ktBlink{
  0%,100%{background:#fff;   border-color:#E9ECEF;box-shadow:none;transform:scale(1)}
  50%    {background:#111;   border-color:#111;   box-shadow:0 0 0 4px rgba(17,17,17,.15);transform:scale(1.04)}
}
.kt-blink{
  animation:ktBlink 2s ease-in-out infinite !important;
  border-color:#111 !important;
}
.kt-blink .kt-num,.kt-blink .kt-label{color:#111 !important}

/* ══════════════════════════════════════════════════════
   CUSTOMER VIEW  — Full redesign, mobile-first bistro app
══════════════════════════════════════════════════════ */

/* ── CSS variables for customer theme ── */
:root{
  --cn2:#2C1A0E;        /* slightly lighter nav for gradient */
  --ca2:#F59E0B;        /* brighter amber for highlights */
  --ccard:#FFFFFF;
  --cshadow:0 2px 12px rgba(28,17,8,.08);
  --cshadow2:0 8px 32px rgba(28,17,8,.14);
}

/* ── Base wrap ── */
.cust-wrap{min-height:100vh;background:#F7F0E8;font-family:'Inter',sans-serif}

/* ── Hero nav header ── */
.cust-nav{
  background:linear-gradient(160deg,#1C1108 0%,#2C1A0E 100%);
  color:#fff;padding:0;position:relative;overflow:hidden
}
.cust-nav::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;height:24px;
  background:#F7F0E8;border-radius:24px 24px 0 0
}
.cust-nav-inner{padding:22px 20px 32px;text-align:center;position:relative;z-index:1}
.cust-brand{
  font-family:'Playfair Display',serif;font-size:32px;color:#fff;
  letter-spacing:.02em;display:block;margin-bottom:4px
}
.cust-brand span{color:#F59E0B;font-style:italic}
.cust-tbl-tag{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(245,158,11,.2);padding:6px 18px;border-radius:20px;
  font-size:13px;border:1px solid rgba(245,158,11,.35);
  color:#FCD34D;font-weight:600;letter-spacing:.01em
}
.cust-tagline{font-size:11px;color:rgba(255,255,255,.3);margin-top:8px;letter-spacing:.1em;text-transform:uppercase}

/* ── Sticky category bar ── */
.cat-bar{
  display:flex;gap:8px;overflow-x:auto;
  padding:14px 16px 10px;background:#F7F0E8;
  scrollbar-width:none;position:sticky;top:0;z-index:20
}
.cat-bar::-webkit-scrollbar{display:none}
.cat-btn{
  padding:8px 20px;border-radius:24px;
  border:1.5px solid #E8D9C4;font-size:13px;font-weight:600;
  white-space:nowrap;background:#fff;cursor:pointer;
  transition:all .2s;flex-shrink:0;color:#9C8060;

}
.cat-btn:hover{border-color:var(--ca);color:var(--ca)}
.cat-btn.on{

  box-shadow:0 4px 14px rgba(28,17,8,.25)
}

/* ── Customer search bar ── */
.cust-search-wrap{
  padding:10px 14px 8px;background:#F7F0E8
}
.cust-search-row{
  display:flex;align-items:center;background:#fff;
  border:1.5px solid #E8D9C4;border-radius:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden;
  transition:border-color .2s,box-shadow .2s
}
.cust-search-row:focus-within{
  border-color:var(--ca);box-shadow:0 2px 8px rgba(217,119,6,.18)
}
.cust-search-icon{padding:0 14px;font-size:15px;color:#C4A882;flex-shrink:0}
.cust-search-input{
  flex:1;padding:12px 0;font-size:14px;border:none;outline:none;
  color:#1C1108;background:transparent;font-family:'Inter',sans-serif
}
.cust-search-input::placeholder{color:#C4A882}
.cust-search-clear{
  padding:0 14px;color:#C4A882;font-size:18px;
  cursor:pointer;border:none;background:none;flex-shrink:0
}
.cust-search-dropdown{
  position:absolute;left:14px;right:14px;top:calc(100% + 4px);

.cust-search-item{

  cursor:pointer;transition:background .12s;border-bottom:1px solid #F5EDE2
}
.cust-search-item:last-child{border-bottom:none}
.cust-search-item:hover,.cust-search-item.focused{background:#FEF9F0}
.cust-search-item-emoji{

.cust-search-item-name{font-size:13.5px;font-weight:600;color:#1C1108;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cust-search-item-name mark{background:transparent;color:var(--ca);font-weight:700}
.cust-search-item-cat{font-size:10.5px;color:#9C8060;text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.cust-search-item-price{font-size:13px;font-weight:700;color:#1C1108;flex-shrink:0}

/* ── Item list ── */
.cust-items{
  padding:4px 14px 130px;max-width:680px;margin:0 auto
}
.cust-cat-label{
  font-size:11px;font-weight:700;color:#9C8060;
  text-transform:uppercase;letter-spacing:.1em;
  padding:14px 2px 8px;display:block
}

/* ── Item card ── */
.cust-item{
  display:flex;gap:0;background:#fff;border-radius:18px;
  margin-bottom:12px;overflow:hidden;
  box-shadow:0 2px 12px rgba(28,17,8,.07);
  transition:transform .18s,box-shadow .18s;
  border:1px solid rgba(28,17,8,.04)
}
.cust-item:active{transform:scale(.985)}
.cust-item.flash{animation:flashItem .6s ease}

/* Image side */
.cust-item-img-wrap{width:110px;flex-shrink:0;position:relative;overflow:hidden}
.cust-item-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.cust-item-img{
  width:110px;height:100%;min-height:100px;
  background:linear-gradient(135deg,#FEF9C3,#FDE68A);
  display:flex;align-items:center;justify-content:center;
  font-size:38px;flex-shrink:0
}

/* ── Veg / Non-veg filter pills ── */
.type-filter-bar{
  display:flex;gap:8px;padding:0 14px 10px;
  background:#F7F0E8;scrollbar-width:none
}
.type-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;
  border:1.5px solid #E8D9C4;background:#fff;cursor:pointer;
  transition:all .18s;white-space:nowrap;flex-shrink:0
}
.type-pill:active{transform:scale(.96)}
.type-pill.veg-on{background:#F0FDF4;border-color:#16A34A;color:#16A34A}
.type-pill.nonveg-on{background:#FEF2F2;border-color:#DC2626;color:#DC2626}
.type-pill.all-on{background:linear-gradient(135deg,#1C1108,#2C1A0E);border-color:transparent;color:#fff}
.type-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* ── Trending / Hot badge on dish card ── */
.cust-badge{
  display:inline-flex;align-items:center;gap:3px;
  font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;
  letter-spacing:.02em;margin-bottom:3px
}
.cust-badge.hot{background:#FEF3C7;color:#D97706;border:1px solid #FCD34D}
.cust-badge.trending{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}
.cust-badge.new{background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0}

.cust-item-type-dot{
  position:absolute;top:8px;left:8px;width:10px;height:10px;
  border-radius:2px;border:2px solid #fff;z-index:2
}

/* Info side */
.cust-item-info{flex:1;min-width:0;padding:14px 14px 12px}
.cust-item-name{
  font-weight:700;font-size:15px;color:#1C1108;
  margin-bottom:4px;line-height:1.3
}
.cust-item-desc{
  font-size:12px;color:#9C8060;line-height:1.6;
  margin-bottom:10px;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden
}
.cust-item-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px}
.cust-item-price{
  font-size:18px;font-weight:800;color:#1C1108;letter-spacing:-.03em
}

/* Add / Qty controls */
.add-btn{
  padding:8px 20px;border-radius:24px;
  background:linear-gradient(135deg,#1C1108,#2C1A0E);
  color:#fff;border:none;font-size:13px;font-weight:700;
  cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;
  box-shadow:0 3px 10px rgba(28,17,8,.25);white-space:nowrap
}
.add-btn:hover{box-shadow:0 5px 16px rgba(28,17,8,.35);transform:translateY(-1px)}
.add-btn:active{transform:scale(.97)}
.qty-row{display:flex;align-items:center;gap:0;background:#F7F0E8;border-radius:24px;overflow:hidden}
.qty-btn{
  width:34px;height:34px;border-radius:0;border:none;
  background:transparent;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .15s;flex-shrink:0;
  font-weight:700;color:#1C1108
}
.qty-btn:hover{background:#E8D9C4}
.qty-n{
  font-size:14px;font-weight:800;min-width:28px;text-align:center;
  color:#1C1108;padding:0 4px
}

/* ── Cart bar (fixed bottom) ── */
.cart-bar-fixed{
  position:fixed;bottom:0;left:0;right:0;z-index:50;cursor:pointer;
  padding:0 16px 16px
}
.cart-bar-fixed::before{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:100%;background:linear-gradient(to top,#F7F0E8 60%,transparent);
  pointer-events:none
}
.cart-bar-inner{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 22px;
  background:linear-gradient(135deg,#D97706,#F59E0B);
  border-radius:18px;position:relative;z-index:1;
  box-shadow:0 8px 32px rgba(217,119,6,.5);
  transition:all .2s
}
.cart-bar-fixed:hover .cart-bar-inner{
  box-shadow:0 12px 40px rgba(217,119,6,.65);
  transform:translateY(-2px)
}
.cart-dot{
  background:rgba(0,0,0,.2);color:#fff;min-width:26px;height:26px;
  border-radius:13px;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;padding:0 8px;border:1px solid rgba(255,255,255,.3)
}
.cart-bar-label{display:flex;align-items:center;gap:12px;font-size:15px;font-weight:700;color:#fff}
.cart-bar-total{font-size:21px;font-weight:900;letter-spacing:-.03em;color:#fff}
.cart-bar-arrow{font-size:20px;color:rgba(255,255,255,.8)}

/* ── Cart panel (bottom sheet) ── */
.cart-panel{
  position:fixed;bottom:0;left:0;right:0;background:#fff;
  border-radius:28px 28px 0 0;z-index:200;
  max-height:88vh;overflow-y:auto;
  box-shadow:0 -20px 60px rgba(28,17,8,.18)
}
.cart-handle{width:44px;height:4px;background:#E8D9C4;border-radius:2px;margin:14px auto 0}
.cart-head{
  padding:16px 22px 14px;border-bottom:1px solid #F5EDE2;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:#fff;z-index:1
}
.cart-head-title{font-family:'Playfair Display',serif;font-size:24px;color:#1C1108}
.cart-close{
  background:#F7F0E8;border:none;width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;color:#9C8060;transition:all .15s;font-weight:700
}
.cart-close:hover{background:#E8D9C4;color:#1C1108}
.cart-body{padding:8px 22px}
.cart-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 0;border-bottom:1px solid #F5EDE2
}
.cart-row:last-child{border-bottom:none}
.cart-item-thumb{
  width:44px;height:44px;border-radius:10px;overflow:hidden;flex-shrink:0;
  background:linear-gradient(135deg,#FEF9C3,#FDE68A);
  display:flex;align-items:center;justify-content:center;font-size:20px;margin-right:10px
}
.cart-item-thumb img{width:100%;height:100%;object-fit:cover}
.cart-item-name{font-weight:700;font-size:14px;color:#1C1108}
.cart-item-sub{font-size:12px;color:#9C8060;margin-top:2px}
.cart-row-controls{display:flex;align-items:center;gap:10px}
.cart-item-total{font-size:14px;font-weight:800;color:#1C1108;min-width:52px;text-align:right}

/* ── Cart footer ── */
.cart-foot{
  padding:16px 22px 24px;
  border-top:1px solid #F5EDE2;
  background:#fff;
  position:sticky;bottom:0
}
.cart-divider{border:none;border-top:1.5px dashed #E8D9C4;margin:0 0 14px}
.cart-summary-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cart-summary-row.total{margin-bottom:16px}
.cart-summary-label{font-size:13.5px;color:#9C8060;font-weight:500}
.cart-summary-total{font-size:28px;font-weight:800;color:#1C1108;letter-spacing:-.04em}
.place-btn{
  width:100%;padding:17px;
  background:linear-gradient(135deg,#D97706,#F59E0B);
  color:#fff;border:none;border-radius:18px;font-size:17px;font-weight:800;
  cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;
  box-shadow:0 6px 24px rgba(217,119,6,.35);letter-spacing:.01em
}
.place-btn:hover{box-shadow:0 8px 32px rgba(217,119,6,.5);transform:translateY(-1px)}
.place-btn:active{transform:scale(.99)}

/* ── Order tracking ── */
.track-page{
  background:#F7F0E8;min-height:calc(100vh - 120px);
  display:flex;align-items:center;justify-content:center;padding:24px
}
.track-wrap{width:100%;max-width:400px;text-align:center}
.track-card{
  background:#fff;border-radius:28px;padding:36px 28px;
  box-shadow:0 12px 48px rgba(28,17,8,.12);
  border:1px solid rgba(28,17,8,.04)
}
.track-icon{font-size:64px;margin-bottom:14px;display:block;line-height:1}
.track-title{font-family:'Playfair Display',serif;font-size:28px;color:#1C1108;margin-bottom:6px}
.track-sub{color:#9C8060;font-size:14px;margin-bottom:16px;line-height:1.6}
.track-oid{
  font-size:11.5px;color:#9C8060;background:#F7F0E8;
  padding:6px 14px;border-radius:20px;display:inline-block;
  margin-bottom:28px;font-weight:600;border:1px solid #E8D9C4;
  letter-spacing:.04em
}
.timeline{margin:0 0 28px;text-align:left}
.tl-step{display:flex;align-items:flex-start;gap:16px;margin-bottom:22px;position:relative}
.tl-step:not(:last-child):before{
  content:'';position:absolute;left:19px;top:40px;bottom:-8px;
  width:2px;background:linear-gradient(to bottom,#E8D9C4,transparent)
}
.tl-dot{
  width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:16px;flex-shrink:0;
  border:2px solid #E8D9C4;background:#fff;transition:all .3s;z-index:1
}
.tl-dot.done{
  background:linear-gradient(135deg,#1C1108,#2C1A0E);
  border-color:transparent;color:#fff;
  box-shadow:0 4px 12px rgba(28,17,8,.25)
}
.tl-dot.active{
  background:linear-gradient(135deg,#D97706,#F59E0B);
  border-color:transparent;color:#fff;
  animation:pulse 1.8s infinite;
  box-shadow:0 0 0 4px rgba(217,119,6,.2)
}
.tl-info{padding-top:8px}
.tl-label{font-weight:700;font-size:14.5px;color:#1C1108}
.tl-label.dim{color:#C4A882}
.tl-sub{font-size:12.5px;color:#9C8060;margin-top:3px;line-height:1.4}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 4px rgba(217,119,6,.2)}
  50%{box-shadow:0 0 0 10px rgba(217,119,6,.06)}
}

/* Flash animation */



/* ── Session Bill & Payment ── */
.bill-card{
  background:#fff;border-radius:24px;padding:22px;
  box-shadow:0 8px 32px rgba(28,17,8,.1);
  border:1px solid rgba(28,17,8,.06);margin-bottom:14px
}
.bill-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;padding-bottom:12px;
  border-bottom:1px solid #F5EDE2
}
.bill-title{
  font-family:'Playfair Display',serif;font-size:20px;color:#1C1108
}
.bill-badge{
  background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;
  border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700
}
.bill-order-block{margin-bottom:12px}
.bill-order-label{
  font-size:11px;font-weight:700;color:#9C8060;
  text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:6px;display:flex;align-items:center;gap:6px
}
.bill-item-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 0;font-size:13.5px
}
.bill-item-name{color:#1C1108;font-weight:500;flex:1}
.bill-item-qty{color:#9C8060;font-size:12px;margin:0 8px}
.bill-item-amt{font-weight:700;color:#1C1108;flex-shrink:0}
.bill-divider{border:none;border-top:1.5px dashed #E8D9C4;margin:12px 0}
.bill-subtotal-row{
  display:flex;justify-content:space-between;
  font-size:13px;color:#9C8060;margin-bottom:4px
}
.bill-total-row{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-top:10px
}
.bill-total-label{font-size:15px;font-weight:700;color:#1C1108}
.bill-total-amt{
  font-size:32px;font-weight:900;color:#1C1108;letter-spacing:-.04em
}
/* Pay button */
.pay-btn{
  width:100%;padding:18px;border:none;border-radius:18px;
  background:linear-gradient(135deg,#1a6b3a,#22c55e);
  color:#fff;font-size:18px;font-weight:900;cursor:pointer;
  font-family:'Inter',sans-serif;letter-spacing:.01em;
  box-shadow:0 8px 28px rgba(34,197,94,.35);
  transition:all .2s;display:flex;align-items:center;
  justify-content:center;gap:10px;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation
}
.pay-btn:hover{box-shadow:0 10px 36px rgba(34,197,94,.5);transform:translateY(-2px)}
.pay-btn:active{transform:scale(.98)}
.pay-btn:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
.pay-success{
  background:linear-gradient(135deg,#14532d,#16a34a);
  border-radius:20px;padding:28px 22px;text-align:center;
  margin-bottom:14px;color:#fff
}
.pay-success-icon{font-size:56px;line-height:1;margin-bottom:12px}
.pay-success-title{font-size:22px;font-weight:800;margin-bottom:6px}
.pay-success-sub{font-size:14px;opacity:.8;line-height:1.5}
/* Razorpay setup hint in admin settings */
.rp-setup-box{
  background:#F0FDF4;border:1.5px solid #86EFAC;border-radius:var(--r);
  padding:14px;margin-top:14px;font-size:13px;line-height:1.7
}


/* ── Quick-Add tray (Roti / Rice / Water after order) ── */
.quick-add-tray{
  background:#fff;border-top:1px solid #F5EDE2;
  padding:16px 16px 20px
}
.quick-add-title{
  font-size:11px;font-weight:700;color:#9C8060;
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;
  display:flex;align-items:center;gap:6px
}
.quick-add-chips{display:flex;gap:10px;flex-wrap:wrap}
.quick-chip{
  display:flex;align-items:center;gap:8px;
  background:#F7F0E8;border:1.5px solid #E8D9C4;
  border-radius:14px;padding:9px 14px;cursor:pointer;
  transition:all .18s;flex-shrink:0
}
.quick-chip:hover,.quick-chip.added{
  background:#FEF9F0;border-color:#D97706;
  box-shadow:0 2px 8px rgba(217,119,6,.15)
}
.quick-chip-emoji{font-size:18px;line-height:1}
.quick-chip-info{display:flex;flex-direction:column;gap:1px}
.quick-chip-name{font-size:13px;font-weight:700;color:#1C1108}
.quick-chip-price{font-size:11px;color:#9C8060;font-weight:500}
.quick-chip-add{
  width:24px;height:24px;border-radius:50%;
  background:linear-gradient(135deg,#D97706,#F59E0B);
  color:#fff;border:none;font-size:16px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all .18s
}

/* ── Search overlay (full screen) ── */
.search-fab{
  position:fixed;bottom:96px;right:18px;z-index:40;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,#1C1108,#2C1A0E);
  color:#fff;border:none;font-size:22px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;box-shadow:0 6px 20px rgba(28,17,8,.35);
  transition:all .2s
}
.search-fab:hover{transform:scale(1.08);box-shadow:0 8px 28px rgba(28,17,8,.45)}
.search-fab.with-cart{bottom:116px}
.search-overlay{
  position:fixed;inset:0;background:rgba(28,17,8,.55);
  z-index:300;display:flex;flex-direction:column;
  backdrop-filter:blur(4px)
}
.search-overlay-box{
  background:#fff;border-radius:0 0 24px 24px;
  padding:16px 16px 20px;
  box-shadow:0 8px 40px rgba(28,17,8,.25)
}
.search-overlay-row{
  display:flex;align-items:center;background:#F7F0E8;
  border-radius:14px;overflow:hidden;margin-bottom:4px
}
.search-overlay-input{
  flex:1;padding:14px 16px;font-size:16px;border:none;
  outline:none;background:transparent;color:#1C1108;
  font-family:'Inter',sans-serif
}
.search-overlay-input::placeholder{color:#C4A882}
.search-overlay-cancel{
  padding:0 16px;font-size:13.5px;font-weight:600;
  color:#9C8060;background:none;border:none;cursor:pointer;
  font-family:'Inter',sans-serif;white-space:nowrap
}
.search-overlay-results{
  background:#fff;flex:1;overflow-y:auto
}
.search-result-item{
  display:flex;align-items:center;gap:14px;padding:14px 16px;
  border-bottom:1px solid #F5EDE2;cursor:pointer;transition:background .12s
}
.search-result-item:hover,.search-result-item:active{background:#FEF9F0}
.search-result-emoji{
  font-size:22px;width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,#FEF9C3,#FDE68A);
  display:flex;align-items:center;justify-content:center;flex-shrink:0
}
.search-result-img{width:44px;height:44px;border-radius:12px;object-fit:cover;flex-shrink:0}
.search-result-name{font-size:14.5px;font-weight:700;color:#1C1108}
.search-result-name mark{background:transparent;color:#D97706;font-weight:800}
.search-result-meta{font-size:12px;color:#9C8060;margin-top:2px}
.search-result-price{font-size:15px;font-weight:800;color:#1C1108;flex-shrink:0}
.search-empty{padding:40px 20px;text-align:center;color:#9C8060;font-size:14px}
.search-popular{padding:16px}
.search-popular-title{font-size:11px;font-weight:700;color:#9C8060;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.search-popular-pill{
  display:inline-block;background:#F7F0E8;border:1px solid #E8D9C4;
  border-radius:20px;padding:6px 14px;font-size:13px;font-weight:500;
  color:#1C1108;margin:0 6px 8px 0;cursor:pointer;transition:all .15s
}
.search-popular-pill:hover{background:#FEF9F0;border-color:#D97706;color:#D97706}

/* ── Order summary on tracking page ── */
.order-summary-card{
  background:#F7F0E8;border-radius:16px;padding:16px;
  margin:20px 0;text-align:left;border:1px solid #E8D9C4
}
.order-summary-title{
  font-size:11px;font-weight:700;color:#9C8060;
  text-transform:uppercase;letter-spacing:.1em;
  margin-bottom:12px;display:flex;align-items:center;gap:6px
}
.order-summary-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;border-bottom:1px solid #E8D9C4;font-size:13.5px
}
.order-summary-row:last-child{border-bottom:none}
.order-summary-item-name{color:#1C1108;font-weight:500;flex:1}
.order-summary-item-qty{color:#9C8060;font-size:12px;margin:0 8px}
.order-summary-item-price{font-weight:700;color:#1C1108;flex-shrink:0}
.order-summary-total-row{
  display:flex;justify-content:space-between;
  margin-top:12px;padding-top:12px;
  border-top:2px dashed #E8D9C4
}
.order-summary-total-label{font-size:13px;font-weight:600;color:#9C8060}
.order-summary-total-val{font-size:22px;font-weight:900;color:#1C1108;letter-spacing:-.03em}


/* ── Roti & Rice glow tab ── */
.cat-btn.roti-rice-glow{
  border-color:#D97706;color:#D97706;
  background:#FEF9F0;
  animation:rotiGlow 1.6s ease-in-out infinite;
  position:relative
}
.cat-btn.roti-rice-glow::after{
  content:'NEW';

}
@keyframes rotiGlow{
  0%,100%{box-shadow:0 0 0 0 rgba(217,119,6,.0);border-color:#D97706}

}

@keyframes flashItem{0%,100%{background:transparent}30%{background:rgba(217,119,6,.15)}}

/* ── SMART MENU BUILDER ── */
.smb-wrap{max-width:900px}
.smb-hero{background:linear-gradient(135deg,#1E293B,#0F172A);border-radius:var(--rl);padding:24px 28px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.smb-hero-text h2{font-family:'Playfair Display',serif;font-size:22px;color:#fff;margin-bottom:4px}
.smb-hero-text p{font-size:13px;color:rgba(255,255,255,.5);line-height:1.5}
.smb-hero-badge{background:rgba(37,99,235,.3);border:1px solid rgba(37,99,235,.5);border-radius:20px;padding:6px 14px;font-size:12px;color:#93C5FD;font-weight:600;white-space:nowrap}
.smb-search-box{background:var(--as);border:1px solid var(--abr);border-radius:var(--rl);padding:20px 22px;margin-bottom:20px;box-shadow:var(--sh1)}
.smb-search-label{font-size:11px;font-weight:700;color:var(--am);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.smb-search-row{display:flex;align-items:center;background:var(--ab);border:2px solid var(--abr);border-radius:var(--r);transition:border-color .15s,box-shadow .15s;overflow:hidden}
.smb-search-row:focus-within{border-color:var(--ac);box-shadow:0 0 0 3px rgba(37,99,235,.1);background:#fff}
.smb-search-icon{padding:0 14px;font-size:16px;flex-shrink:0}
.smb-search-input{flex:1;padding:12px 0;font-size:15px;border:none;outline:none;color:var(--at);background:transparent;font-family:'Inter',sans-serif}
.smb-search-input::placeholder{color:#94A3B8}
.smb-search-clear{padding:0 14px;color:var(--am);font-size:20px;cursor:pointer;border:none;background:none;flex-shrink:0}
.smb-dropdown{border:1.5px solid var(--abr);border-radius:var(--rl);background:#fff;box-shadow:var(--sh3);overflow:hidden;margin-top:6px;max-height:320px;overflow-y:auto}
.smb-suggestion{display:flex;align-items:center;gap:14px;padding:12px 16px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--abr)}

// Rank menu items by relevance to query string
function filterMenu(items, query){
  const q = query.trim().toLowerCase();
  if(!q) return [];
  return items
    .map(item=>{
      const name = item.name.toLowerCase();
      const desc = (item.description||"").toLowerCase();
      const cat  = (item.category||"").toLowerCase();
      let score = 0;
      if(name===q)                   score=100;
      else if(name.startsWith(q))    score=80;
      else if(name.includes(q))      score=60;
      else if(cat.includes(q))       score=40;
      else if(desc.includes(q))      score=20;
      return score>0 ? {...item,_score:score} : null;
    })
    .filter(Boolean)
    .sort((a,b)=>b._score-a._score)
    .slice(0,6);
}

// Wrap matched text in <mark>
function HighlightMatch({text, query}){
  if(!query.trim()) return <span>{text}</span>;
  const idx = text.toLowerCase().indexOf(query.trim().toLowerCase());
  if(idx<0) return <span>{text}</span>;
  return <span>{text.slice(0,idx)}<mark>{text.slice(idx,idx+query.trim().length)}</mark>{text.slice(idx+query.trim().length)}</span>;
}

// Admin search bar (used inside MenuMgmt)
function AdminSearchBar({menu, onSelect}){
  const [query,setQuery] = useState("");
  const [open,setOpen]   = useState(false);
  const [focused,setFocused] = useState(-1);
  const wrapRef = useRef(null);
  const results = filterMenu(menu, query);

  // Close on outside click
  useEffect(()=>{
    function handler(e){ if(wrapRef.current&&!wrapRef.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown",handler);
    return ()=>document.removeEventListener("mousedown",handler);
  },[]);

  function handleKey(e){
    if(!open||!results.length) return;
    if(e.key==="ArrowDown"){e.preventDefault();setFocused(f=>Math.min(f+1,results.length-1));}
    else if(e.key==="ArrowUp"){e.preventDefault();setFocused(f=>Math.max(f-1,0));}
    else if(e.key==="Enter"&&focused>=0){e.preventDefault();pick(results[focused]);}
    else if(e.key==="Escape"){setOpen(false);setFocused(-1);}
  }

  function pick(item){ setQuery(""); setOpen(false); setFocused(-1); onSelect(item); }

  return(
    <div className="search-wrap" ref={wrapRef}>
      <div className="search-input-row">
        <span className="search-icon">🔍</span>
        <input
          className="search-input"
          placeholder="Search dishes…"
          value={query}
          onChange={e=>{setQuery(e.target.value);setOpen(true);setFocused(-1);}}
          onFocus={()=>{if(query.trim()) setOpen(true);}}
          onKeyDown={handleKey}
        />
        {query&&<button className="search-clear" onClick={()=>{setQuery("");setOpen(false);}}>×</button>}
      </div>
      {open&&query.trim()&&(
        <div className="search-dropdown">
          {results.length===0
            ?<div className="search-no-results">No dishes match "{query}"</div>
            :results.map((item,i)=>(
              <div key={item.id} className={`search-item ${i===focused?"focused":""}`} onMouseDown={()=>pick(item)}>
                <div className="search-item-emoji">{item.emoji||"🍽️"}</div>
                <div className="search-item-info">
                  <div className="search-item-name"><HighlightMatch text={item.name} query={query}/></div>
                  <div className="search-item-meta">{item.category} · {item.available?"Available":"Out of stock"}</div>
                </div>
                <div className="search-item-price">{fmt(item.price)}</div>
              </div>
            ))
          }
        </div>
      )}
    </div>
  );
}

function CustSearchBar({menu, onSelect, onClear}){
  const [query,setQuery] = useState("");
  const [open,setOpen]   = useState(false);
  const [focused,setFocused] = useState(-1);
  const wrapRef = useRef(null);
  // Only search available items for customers
  const results = filterMenu(menu.filter(m=>m.available), query);

  useEffect(()=>{
    function handler(e){ if(wrapRef.current&&!wrapRef.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown",handler);
    return ()=>document.removeEventListener("mousedown",handler);
  },[]);

  function handleKey(e){
    if(!open||!results.length) return;
    if(e.key==="ArrowDown"){e.preventDefault();setFocused(f=>Math.min(f+1,results.length-1));}
    else if(e.key==="ArrowUp"){e.preventDefault();setFocused(f=>Math.max(f-1,0));}
    else if(e.key==="Enter"&&focused>=0){e.preventDefault();pick(results[focused]);}
    else if(e.key==="Escape"){clear();}
  }

  function pick(item){ setQuery(""); setOpen(false); setFocused(-1); onSelect(item); }
  function clear(){ setQuery(""); setOpen(false); onClear(); }

  return(
    <div className="cust-search-wrap" style={{position:"relative"}} ref={wrapRef}>
      <div className="cust-search-row">
        <span className="cust-search-icon">🔍</span>
        <input
          className="cust-search-input"
          placeholder="Search the menu…"
          value={query}
          onChange={e=>{setQuery(e.target.value);setOpen(true);setFocused(-1);}}
          onFocus={()=>{if(query.trim()) setOpen(true);}}
          onKeyDown={handleKey}
        />
        {query&&<button className="cust-search-clear" onClick={clear}>×</button>}
      </div>
      {open&&query.trim()&&(
        <div className="cust-search-dropdown">
          {results.length===0
            ?<div className="search-no-results">No dishes match "{query}"</div>
            :results.map((item,i)=>(
              <div key={item.id} className={`cust-search-item ${i===focused?"focused":""}`} onMouseDown={()=>pick(item)}>
                <div className="cust-search-item-emoji">{item.emoji||"🍽️"}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div className="cust-search-item-name"><HighlightMatch text={item.name} query={query}/></div>

                <div className="cust-search-item-price">{fmt(item.price)}</div>
              </div>
            ))
          }
        </div>
      )}
    </div>
  );
}

  const status = profile.subscription_status;
  if(status==="active"){
    // Check if 30 days have passed since subscription_start
    if(profile.subscription_start){
      const start = new Date(profile.subscription_start);
      const now   = new Date();
      const days  = (now-start)/(1000*60*60*24);
      if(days > 30) return false; // expired
    }
    return true;
  }
  return false;
}

function daysLeft(profile){
  if(!profile?.subscription_start) return 0;
  const start = new Date(profile.subscription_start);
  const exp   = new Date(start.getTime() + 30*24*60*60*1000);
  const diff  = Math.ceil((exp - new Date())/(1000*60*60*24));
  return Math.max(0, diff);
}

// ─── ADMIN APP ────────────────────────────────────────────────────────
function AdminApp({user, profile, onLogout, onProfileUpdated}){
  const [tab,setTab]=useState("orders");
  const [orders,setOrders]=useState([]);
  const [menu,setMenu]=useState([]);
  const [loading,setLoading]=useState(true);
  const [toast,showToast]=useToast();
  const [sideOpen,setSideOpen]=useState(false);

  const [realtimeOk,setRealtimeOk]=useState(false);

  useEffect(()=>{
    const rid = user?.id || null;
    Promise.all([
      rid ? dbOrdersScoped(rid) : dbOrders(),
      rid ? dbMenuScoped(rid)   : dbMenu()
    ]).then(([o,m])=>{
      setOrders(o);setMenu(m);setLoading(false);
    });
  },[user]);

  // Realtime: handles INSERT (new order) and UPDATE (status change) instantly
  useEffect(()=>{
    const rid = user?.id || null;
    const chName = "admin-" + (rid||"shared");
    // Build filter so each restaurant only gets their own order events
    const orderFilter = rid ? `restaurant_id=eq.${rid}` : undefined;
    const ch = sb.channel(chName)
      .on("postgres_changes",
        {event:"INSERT", schema:"public", table:"orders", ...(orderFilter && {filter:orderFilter})},
        (payload)=>{
          // Extra guard: ignore orders that don't belong to this restaurant
          if(rid && payload.new.restaurant_id && payload.new.restaurant_id !== rid) return;
          const newOrder = {...payload.new, table:payload.new.table_num};
          setOrders(prev=>{
            if(prev.find(o=>o.id===newOrder.id)) return prev;
            return [newOrder, ...prev];
          });
        }
      )
      .on("postgres_changes",
        {event:"UPDATE", schema:"public", table:"orders", ...(orderFilter && {filter:orderFilter})},
        (payload)=>{
          if(rid && payload.new.restaurant_id && payload.new.restaurant_id !== rid) return;
          setOrders(prev=>prev.map(o=>
            o.id===payload.new.id ? {...o,...payload.new, table:payload.new.table_num} : o
          ));
        }
      )
      .subscribe((status)=>{ setRealtimeOk(status==="SUBSCRIBED"); });
    return ()=>sb.removeChannel(ch);
  },[user?.id]);

  // Polling fallback every 4s: guarantees updates even if Realtime
  // is not enabled in Supabase dashboard (Table Replication settings)
  useEffect(()=>{
    const _rid=user?.id||null;
    const iv=setInterval(()=>{
      (_rid?dbOrdersScoped(_rid):dbOrders()).then(fresh=>{
        setOrders(prev=>{
          if(JSON.stringify(prev)===JSON.stringify(fresh)) return prev;
          return fresh;
        });
      });
    },4000);
    return ()=>clearInterval(iv);
  },[]);

  async function handleStatus(id,status){
    try{
      await dbUpdateStatus(id,status);
      setOrders(p=>p.map(o=>o.id===id?{...o,status}:o));
      showToast("Order updated → "+status);
    }catch(e){showToast("Update failed");}
  }

  const tabs=[
    {id:"dashboard",icon:"📊",label:"Dashboard"},
    {id:"orders",   icon:"🔔",label:"Live Orders"},
    {id:"history",  icon:"📋",label:"History"},
    {id:"menu",     icon:"🍽️",label:"Menu"},
    {id:"smart",    icon:"⚡",label:"Smart Builder"},
    {id:"kitchen",  icon:"👨‍🍳",label:"Kitchen"},   // kept for manager overview
    {id:"qr",       icon:"📱",label:"QR Codes"},
    {id:"settings", icon:"⚙️", label:"Settings"},
  ];
  const activeCount=orders.filter(o=>o.status!=="delivered").length;
  function navTo(id){setTab(id);setSideOpen(false);}

  if(loading) return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div className="spinner" style={{width:32,height:32,borderWidth:3}}/>
      <div style={{color:"var(--am)",fontSize:14}}>Connecting to Supabase…</div>
    </div>
  );

  const tabLabel = tabs.find(t=>t.id===tab)?.label || "";

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}}>
      {toast&&<Toast msg={toast}/>}

      {/* ── Nav bar ── */}
      <nav className="admin-nav">
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button className="hamburger" onClick={()=>setSideOpen(v=>!v)}

          }}/>
        )}

        {/* ── Sidebar / Drawer ── */}
        <div className={`sidebar ${sideOpen?"open":""}`} style={{zIndex:170}}>

            <button key={t.id} className={`sidebar-item ${tab===t.id?"active":""}`} onClick={()=>navTo(t.id)}>

// ─── DASHBOARD ────────────────────────────────────────────────────────
