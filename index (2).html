  const today=orders.filter(o=>new Date(o.created_at).toDateString()===new Date().toDateString());
  const active=orders.filter(o=>o.status!=="delivered").length;
  const avail=menu.filter(m=>m.available).length;
  return(
    <div>
      <div className="page-header">
        <div className="page-title">Dashboard</div>
        <div className="page-sub">Live overview · auto-refreshes every 4s</div>
      </div>
      <div className="stats-grid">
        <div className="stat-card"><span className="stat-icon">📋</span><span className="stat-num">{today.length}</span><div className="stat-label">Orders Today</div></div>
        <div className="stat-card"><span className="stat-icon">🔥</span><span className="stat-num">{active}</span><div className="stat-label">Active Now</div></div>
        <div className="stat-card"><span className="stat-icon">✅</span><span className="stat-num">{avail}</span><div className="stat-label">Items Live</div></div>
      </div>
      <div className="card">
        <div className="card-head"><span className="card-title">Recent Orders</span></div>
        {orders.length===0&&<div style={{color:"var(--am)",fontSize:13}}>No orders yet. Share your QR codes to get started!</div>}
        {orders.slice(0,6).map(o=>(
          <div key={o.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid var(--abr)"}}>
            <div>
              <span style={{fontWeight:600,fontSize:14,color:"var(--at)"}}>Table {o.table_num||o.table}</span>
              <span style={{fontSize:12,color:"var(--am)",marginLeft:8}}>{o.items.length} item{o.items.length!==1?"s":""} · {fmtT(o.created_at)}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <SBadge status={o.status}/>
              <span style={{fontWeight:700,fontSize:15,color:"var(--at)"}}>{fmt(o.total)}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── ACTIVE ORDERS ────────────────────────────────────────────────────
function ActiveOrders({orders,onUpdateStatus}){
  const active = orders.filter(o=>o.status!=="delivered");
  const pending   = active.filter(o=>o.status==="pending");
  const preparing = active.filter(o=>o.status==="preparing");
  const ready     = active.filter(o=>o.status==="ready");

  // Time chip — shows minutes elapsed, turns red after 15 mins
  function TimeChip({created_at}){
    const mins = Math.floor((Date.now()-new Date(created_at).getTime())/60000);
    const cls  = mins<8?"fresh":mins<15?"mid":"old";
    const label= mins<1?"Just now":mins<60?`${mins}m ago`:`${Math.floor(mins/60)}h ago`;
    return <span className={`lo-time-chip ${cls}`}>⏱ {label}</span>;
  }

  // A single order ticket
  function Ticket({o, actionLabel, actionCls, onAction}){
    const tbl = o.table_num||o.table;
    return(
      <div className="lo-ticket">
        <div className="lo-ticket-top">
          <div>
            <div style={{fontSize:10,fontWeight:700,color:"var(--am)",letterSpacing:".06em",marginBottom:2}}>TABLE</div>
            <div className="lo-table-num">{tbl}</div>
          </div>
          <TimeChip created_at={o.created_at}/>
        </div>
        <div className="lo-items">
          {o.items.map((item,i)=>(
            <div key={i} className="lo-item-row">
              <span className="lo-item-qty">{item.qty}</span>
              <span className="lo-item-name">{item.name}</span>
            </div>
          ))}
        </div>
        <div className="lo-ticket-foot">
          <span className="lo-total">{fmt(o.total)}</span>
          <button className={`lo-action-btn ${actionCls}`} onClick={()=>onAction(o.id)}>
            {actionLabel}
          </button>
        </div>
      </div>
    );
  }

  if(active.length===0) return(
    <div>
      <div className="page-header">
        <div className="page-title">Live Orders</div>
        <div className="page-sub">No active orders · refreshes automatically</div>
      </div>
      <div className="empty">
        <div className="empty-icon">✅</div>
        <div style={{fontWeight:600,fontSize:16,color:"var(--at)",marginBottom:4}}>All caught up!</div>
        <div>No active orders right now.</div>
      </div>
    </div>
  );

  return(
    <div>
      <div className="page-header">
        <div className="page-title">Live Orders</div>
        <div className="page-sub">{active.length} active · updates in real-time</div>
      </div>

      {/* Summary chips */}
      <div className="lo-summary">
        <div className="lo-summary-chip" style={{background:"#FFF3E0",borderColor:"#FFCC80",color:"#E65100"}}>
          🔔 <strong>{pending.length}</strong> New
        </div>
        <div className="lo-summary-chip" style={{background:"#FFFDE7",borderColor:"#FFF176",color:"#F57F17"}}>
          👨‍🍳 <strong>{preparing.length}</strong> Preparing
        </div>
        <div className="lo-summary-chip" style={{background:"#E8F5E9",borderColor:"#A5D6A7",color:"#2E7D32"}}>
          🔔 <strong>{ready.length}</strong> Ready
        </div>
      </div>

      {/* Three-lane board */}
      <div className="lo-board">
        {/* LANE 1 — New orders */}
        <div className="lo-lane">
          <div className="lo-lane-head pending">
            <div className="lo-lane-title">🔔 New Orders</div>
            <div className="lo-lane-count pending">{pending.length}</div>
          </div>
          <div className="lo-lane-body">
            {pending.length===0
              ?<div className="lo-empty">No new orders</div>
              :pending.map(o=><Ticket key={o.id} o={o} actionLabel="▶ Start Preparing" actionCls="pending" onAction={id=>onUpdateStatus(id,"preparing")}/>)
            }
          </div>
        </div>

        {/* LANE 2 — Preparing */}
        <div className="lo-lane">
          <div className="lo-lane-head preparing">
            <div className="lo-lane-title">👨‍🍳 Preparing</div>
            <div className="lo-lane-count preparing">{preparing.length}</div>
          </div>
          <div className="lo-lane-body">
            {preparing.length===0
              ?<div className="lo-empty">Nothing cooking</div>
              :preparing.map(o=><Ticket key={o.id} o={o} actionLabel="✓ Mark Ready" actionCls="preparing" onAction={id=>onUpdateStatus(id,"ready")}/>)
            }
          </div>
        </div>

        {/* LANE 3 — Ready to serve */}
        <div className="lo-lane">
          <div className="lo-lane-head ready">
            <div className="lo-lane-title">🍽️ Ready to Serve</div>
            <div className="lo-lane-count ready">{ready.length}</div>
          </div>
          <div className="lo-lane-body">
            {ready.length===0
              ?<div className="lo-empty">Nothing ready yet</div>
              :ready.map(o=><Ticket key={o.id} o={o} actionLabel="✓ Delivered" actionCls="ready" onAction={id=>onUpdateStatus(id,"delivered")}/>)
            }
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── ORDER HISTORY ────────────────────────────────────────────────────
function OrderHistory({orders}){
  const [fTbl,setFTbl]=useState("");
  const [fDt,setFDt]=useState("");
  const filtered=orders.filter(o=>{
    if(fTbl&&(o.table_num||o.table)!==parseInt(fTbl)) return false;
    if(fDt&&new Date(o.created_at).toDateString()!==new Date(fDt).toDateString()) return false;
    return true;
  });
  const rev=filtered.reduce((s,o)=>s+o.total,0);
  return(
    <div>
      <div className="page-header"><div className="page-title">Order History</div><div className="page-sub">{filtered.length} orders · {fmt(rev)} total</div></div>
      <div className="filters">
        <input placeholder="Table #" type="number" value={fTbl} onChange={e=>setFTbl(e.target.value)} style={{width:100}}/>
        <input type="date" value={fDt} onChange={e=>setFDt(e.target.value)}/>
        {(fTbl||fDt)&&<button className="btn btn-outline btn-sm" onClick={()=>{setFTbl("");setFDt("");}}>Clear</button>}
      </div>
      <div className="card" style={{padding:0}}>
        <div className="tbl-wrap">
          <table>
            <thead><tr><th>Order ID</th><th>Table</th><th>Items</th><th>Date & Time</th><th>Total</th><th>Status</th></tr></thead>
            <tbody>
              {filtered.length===0
                ?<tr><td colSpan={6} style={{textAlign:"center",padding:40,color:"var(--am)"}}>No orders found</td></tr>
                :filtered.map(o=>(
                  <tr key={o.id}>
                    <td style={{fontWeight:700,fontSize:11,whiteSpace:"nowrap"}}>{o.id}</td>
                    <td><span style={{background:"#FEF9C3",color:"#92400E",padding:"3px 10px",borderRadius:20,fontWeight:700,fontSize:12,whiteSpace:"nowrap"}}>Table {o.table_num||o.table}</span></td>
                    <td style={{minWidth:150}}>{o.items.map((i,idx)=><div key={idx} style={{fontSize:11,color:"var(--am)",whiteSpace:"nowrap"}}>{i.name} ×{i.qty} — {fmt(i.price*i.qty)}</div>)}</td>
                    <td style={{fontSize:11,color:"var(--am)",whiteSpace:"nowrap"}}>{fmtD(o.created_at)}<br/>{fmtT(o.created_at)}</td>
                    <td style={{fontFamily:"'Playfair Display',serif",fontSize:16,whiteSpace:"nowrap"}}>{fmt(o.total)}</td>
                    <td><SBadge status={o.status}/></td>
                  </tr>
                ))
              }
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── MENU MANAGEMENT ──────────────────────────────────────────────────
const EMOJIS=["🥗","🍤","🥘","🫕","🍛","🍝","🥩","🍱","🍹","☕","🧃","🥤","🍰","🍮","🍩","🍨"];

function MenuMgmt({menu,setMenu,showToast,userId}){
  const [modal,setModal]=useState(null);
  const [fCat,setFCat]=useState("All");
  const [saving,setSaving]=useState(false);
  const [query,setQuery]=useState("");
  const cats=["All","Starter","Main Course","Drinks","Dessert"];

  // Live filter: search takes priority over category
  const q = query.trim().toLowerCase();
  const visible = q
    ? menu.filter(m=>
        m.name.toLowerCase().includes(q) ||
        (m.description||"").toLowerCase().includes(q) ||
        m.category.toLowerCase().includes(q))
    : (fCat==="All" ? menu : menu.filter(m=>m.category===fCat));

  async function save(item){
    setSaving(true);
    try{
      const saved = userId ? await dbUpsertItemScoped(item,userId) : await dbUpsertItem(item);
      if(item.id) setMenu(p=>p.map(m=>m.id===item.id?saved:m));
      else setMenu(p=>[...p,saved]);
      showToast(item.id?"Dish updated!":"Dish added!");
      setModal(null);
    }catch(e){console.error(e);showToast("Error: "+(e?.message||"saving dish").slice(0,60));}
    setSaving(false);
  }
  async function del(id){
    try{await dbDeleteItem(id);setMenu(p=>p.filter(m=>m.id!==id));showToast("Dish removed.");}
    catch(e){showToast("Error deleting dish");}
  }
  async function tog(id,cur){
    try{await dbToggleItem(id,!cur);setMenu(p=>p.map(m=>m.id===id?{...m,available:!cur}:m));}
    catch(e){showToast("Error toggling availability");}
  }

  return(
    <div>
      {/* Header row */}
      {/* Title + search + add — all in one top bar */}
      <div style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div>
            <div className="page-title" style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:"var(--at)"}}>Menu</div>
            <div className="page-sub">{menu.length} dishes{query?" · "+visible.length+" found":""}</div>
          </div>
          <button className="btn btn-amber btn-sm" style={{background:"var(--ac)",flexShrink:0}}
            onClick={()=>setModal({category:"Starter",available:true,emoji:"🍽️",price:"",name:"",description:""})}>
            + Add Dish
          </button>
        </div>
        {/* Search bar — right below the title */}
        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:15,pointerEvents:"none",color:"var(--am)"}}>🔍</span>
          <input
            value={query}
            onChange={e=>setQuery(e.target.value)}
            placeholder="Search dishes…"
            autoComplete="off"
            style={{
              width:"100%",padding:"10px 36px 10px 38px",
              border:"1.5px solid var(--abr)",borderRadius:"var(--rl)",
              fontSize:14,fontFamily:"'Inter',sans-serif",
              background:"#fff",color:"var(--at)",outline:"none",
              transition:"border-color .15s",boxSizing:"border-box"
            }}
            onFocus={e=>e.target.style.borderColor="var(--ac)"}
            onBlur={e=>e.target.style.borderColor="var(--abr)"}
          />
          {query&&(
            <button onClick={()=>setQuery("")}
              style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",
                background:"none",border:"none",fontSize:18,color:"var(--am)",cursor:"pointer",lineHeight:1}}>
              ×
            </button>
          )}
        </div>
      </div>

      {/* Category pills — hidden while searching */}
      {!query&&(
        <div className="cat-pills" style={{marginBottom:14}}>
          {cats.map(c=>(
            <button key={c} className={`cat-pill ${fCat===c?"on":""}`}
              onClick={()=>setFCat(c)}>
              {c}
            </button>
          ))}
        </div>
      )}

      {/* Search context label */}
      {query&&(
        <div style={{fontSize:12,color:"var(--am)",marginBottom:12}}>
          {visible.length} result{visible.length!==1?"s":""} for "<strong style={{color:"var(--ac)"}}>{query}</strong>"
        </div>
      )}

      {/* Empty states */}
      {menu.length===0&&(
        <div className="empty"><div className="empty-icon">🍽️</div><div>No items yet. Add your first dish!</div></div>
      )}
      {menu.length>0&&visible.length===0&&(
        <div className="empty">
          <div className="empty-icon">🔍</div>
          <div style={{fontWeight:600,marginBottom:4}}>No dishes found</div>
          <div style={{fontSize:13,color:"var(--am)"}}>Try a different search term</div>
        </div>
      )}

      {/* Menu grid */}
      <div className="menu-grid">
        {visible.map(item=>(
          <div key={item.id} className="menu-card">
            {item.image_url
              ?<div className="menu-img" style={{padding:0,overflow:"hidden"}}>
                  <img src={item.image_url} alt={item.name} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}} loading="lazy"/>
                </div>
              :<div className="menu-img">{item.emoji||"🍽️"}</div>
            }
            <div className="menu-body">
              <div className="menu-cat">{item.category}</div>
              <div className="menu-name">{item.name}</div>
              <div className="menu-desc">{item.description}</div>
              <div className="menu-foot">
                <span className="menu-price">{fmt(item.price)}</span>
                <label className="toggle"><input type="checkbox" checked={item.available} onChange={()=>tog(item.id,item.available)}/><span className="tog-sl"/></label>
              </div>
              <div style={{display:"flex",gap:8,marginTop:10}}>
                <button className="btn btn-outline btn-sm" style={{flex:1}} onClick={()=>setModal(item)}>Edit</button>
                <button className="btn btn-danger btn-sm"  style={{flex:1}} onClick={()=>del(item.id)}>Delete</button>
              </div>
            </div>
          </div>
        ))}
      </div>
      {modal&&<DishModal item={modal} saving={saving} onSave={save} onClose={()=>setModal(null)}/>}
    </div>
  );
}

function DishModal({item,saving,onSave,onClose}){
  const cats=["Starter","Main Course","Drinks","Dessert"];
  const [f,setF]=useState({
    name:item.name||"",description:item.description||"",
    price:item.price||"",category:item.category||"Starter",
    emoji:item.emoji||"🍽️",available:item.available!==false,
    image_url:item.image_url||"",type:item.type||"veg",
    ...(item.id?{id:item.id}:{})
  });
  const fileRef = useRef(null);
  const [imgPreview,setImgPreview] = useState(item.image_url||"");
  const [imgTab,setImgTab] = useState(item.image_url?"upload":"emoji"); // "emoji"|"upload"|"url"

  const ch=e=>{const{name,value,type,checked}=e.target;setF(p=>({...p,[name]:type==="checkbox"?checked:value}));};

  function handleFile(e){
    const file=e.target.files[0]; if(!file) return;
    // Compress: draw to canvas at max 600px wide, export as jpeg 0.75
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      const MAX=600;
      const scale=Math.min(1,MAX/Math.max(img.width,img.height));
      const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
      const canvas=document.createElement("canvas");
      canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      const data=canvas.toDataURL("image/jpeg",0.75);
      setImgPreview(data);
      setF(p=>({...p,image_url:data}));
      URL.revokeObjectURL(url);
    };
    img.src=url;
  }

  function clearImage(){setImgPreview("");setF(p=>({...p,image_url:""}));}

  function submit(){if(!f.name||!f.price)return;onSave({...f,price:parseFloat(f.price)});}

  return(
    <div className="modal-bg" onClick={e=>e.target.className==="modal-bg"&&onClose()}>
      <div className="modal"><div className="modal-handle"/>
        <div className="modal-title">{f.id?"Edit Dish":"Add New Dish"}</div>

        {/* Name & Description */}
        <div className="field"><label>Dish Name</label><input name="name" value={f.name} onChange={ch} placeholder="e.g. Butter Chicken" autoFocus/></div>
        <div className="field"><label>Description</label><textarea name="description" value={f.description} onChange={ch} placeholder="Brief description…"/></div>

        {/* Price, Category, Type */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
          <div className="field"><label>Price (₹)</label><input name="price" type="number" value={f.price} onChange={ch} placeholder="299"/></div>
          <div className="field"><label>Category</label><select name="category" value={f.category} onChange={ch}>{cats.map(c=><option key={c}>{c}</option>)}</select></div>
          <div className="field"><label>Type</label><select name="type" value={f.type} onChange={ch}><option value="veg">Veg</option><option value="nonveg">Non-Veg</option></select></div>
        </div>

        {/* Photo section */}
        <div className="field">
          <label>Dish Photo</label>
          {/* Tab switcher */}
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            {[["emoji","🎭 Icon"],["upload","📷 Upload"],["url","🔗 URL"]].map(([id,lbl])=>(
              <button key={id} type="button"
                style={{padding:"5px 12px",borderRadius:8,border:`1.5px solid ${imgTab===id?"var(--ac)":"var(--abr)"}`,

// ─── QR CODES ─────────────────────────────────────────────────────────
function QRCodes({userId}){
  const isFile   = location.protocol==="file:";
  const autoBase = isFile?"":(location.origin+location.pathname).replace(/\?.*$/,"");
  const [count,  setCount]  = useState(5);
  const [baseUrl,setBaseUrl]= useState(autoBase);
  const [tab,    setTab]    = useState("tables"); // "tables" | "kitchen"
  const [gen,    setGen]    = useState(false);
  const [saved,  setSaved]  = useState(false);

  // Load saved table count when component mounts
  useEffect(()=>{
    if(userId){
      sb.from("restaurants").select("table_count").eq("id",userId).single()
        .then(({data})=>{ if(data?.table_count) setCount(data.table_count); });
    }
  },[userId]);

  // Save table count immediately when owner changes the number
  function handleCountChange(val){
    setCount(val);
    setSaved(false);
    if(userId){
      updateProfile(userId,{table_count:val})
        .then(()=>setSaved(true))
        .catch(()=>{});
    }
  }
  const tableRefs  = useRef({});
  const kitchenRef = useRef(null);

  useEffect(()=>{
    if(!gen) return;
    const base = baseUrl.trim().replace(/\/+$/,"");
    if(!base) return;
    if(tab==="tables"){
      Object.keys(tableRefs.current).forEach(t=>{
        const el=tableRefs.current[t]; if(!el) return; el.innerHTML="";
        try{new QRCode(el,{text:`${base}?table=${t}${userId?"&rid="+userId:""}`,width:130,height:130,colorDark:"#1C1108",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.M});}catch(e){}
      });
    }
    if(tab==="kitchen"&&userId&&kitchenRef.current){
      kitchenRef.current.innerHTML="";
      try{new QRCode(kitchenRef.current,{text:`${base}?kitchen=1&rid=${userId}&tables=${count}`,width:180,height:180,colorDark:"#1C1108",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.M});}catch(e){}
    }
  },[gen,count,baseUrl,tab,userId]);

  function generate(){
    if(!baseUrl.trim()){alert("Enter your hosted URL first.");return;}
    // Always re-save table_count when generating (belt + suspenders)
    if(userId && tab==="tables"){
      updateProfile(userId,{table_count:count}).catch(()=>{});
    }
    setGen(false);setTimeout(()=>setGen(true),60);
  }

  return(
    <div>
      <div className="page-header">
        <div className="page-title">QR Code Generator</div>
        <div className="page-sub">Customer table QRs and kitchen display QR</div>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:20}}>
        {[{id:"tables",label:"🍽️ Customer Tables"},{id:"kitchen",label:"👨‍🍳 Kitchen QR"}].map(t=>(
          <button key={t.id}
            className={tab===t.id?"btn btn-primary btn-sm":"btn btn-outline btn-sm"}
            onClick={()=>{setTab(t.id);setGen(false);}}>
            {t.label}
          </button>
        ))}
      </div>

      {isFile&&(
        <div style={{background:"#FEF3C7",border:"1.5px solid #F59E0B",borderRadius:"var(--r)",padding:"12px 16px",marginBottom:16,fontSize:13,color:"#78350F"}}>
          <strong>⚠️ Local file detected.</strong> Deploy to a hosted URL first, then paste it below.
        </div>
      )}

      <div className="card" style={{maxWidth:480}}>
        <div className="field">
          <label>Hosted URL of this file</label>
          <input type="url" value={baseUrl} onChange={e=>setBaseUrl(e.target.value)} placeholder="https://your-site.netlify.app/index.html"/>
          {!isFile&&<div style={{fontSize:11,color:"var(--grn)",marginTop:4}}>✓ Auto-detected from current URL</div>}
        </div>
        {tab==="tables"&&(
          <div className="field">
            <label>Number of Tables</label>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <input type="number" min={1} max={50} value={count}
                style={{width:80}}
                onChange={e=>handleCountChange(Math.max(1,Math.min(50,parseInt(e.target.value)||1)))}/>
              {saved&&<span style={{fontSize:12,color:"var(--grn)",fontWeight:600}}>✓ Saved — kitchen will show {count} tables</span>}
            </div>
          </div>
        )}
        {tab==="kitchen"&&(
          <div style={{background:"var(--acl)",border:"1px solid #BFDBFE",borderRadius:"var(--r)",padding:"10px 14px",marginBottom:14,fontSize:13,color:"var(--ac)",lineHeight:1.6}}>
            📱 Print this QR and stick it in the kitchen. Any chef scans it — no login needed. The QR includes your table count ({count} tables), so the kitchen shows exactly the right number of boxes.
          </div>
        )}
        <button className="btn btn-amber" onClick={generate}>Generate QR</button>
      </div>

      {gen&&baseUrl.trim()&&tab==="tables"&&(
        <>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"16px 0 12px"}}>
            <span style={{fontWeight:600,fontSize:14}}>{count} table QR codes</span>
            <button className="btn btn-outline btn-sm" onClick={()=>window.print()}>🖨️ Print All</button>
          </div>
          <div className="qr-grid">
            {Array.from({length:count},(_,i)=>i+1).map(t=>(
              <div key={t} className="qr-card">
                <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>Table {t}</div>
                <div ref={el=>{tableRefs.current[t]=el;}}/>
                <div style={{fontSize:10,color:"var(--am)",marginTop:8,wordBreak:"break-all"}}>{baseUrl.trim().replace(/\/+$/,"")}?table={t}&rid={userId}</div>
              </div>
            ))}
          </div>
        </>
      )}

      {gen&&baseUrl.trim()&&tab==="kitchen"&&(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16,marginTop:20}}>
          <div className="card" style={{maxWidth:300,textAlign:"center",padding:28}}>
            <div style={{fontSize:32,marginBottom:8}}>👨‍🍳</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,marginBottom:4,color:"var(--at)"}}>Kitchen Display</div>
            <div style={{fontSize:12,color:"var(--am)",marginBottom:16,lineHeight:1.5}}>Scan to view all live orders.<br/>Works on any phone, no login needed.</div>
            <div style={{background:"var(--ab)",borderRadius:12,padding:16,display:"inline-block",marginBottom:12}}>
              <div ref={kitchenRef}/>
            </div>
            <div style={{fontSize:10,color:"var(--am)",wordBreak:"break-all",lineHeight:1.6}}>
              {baseUrl.trim().replace(/\/+$/,"")}?kitchen=1&rid={userId}&tables={count}
            </div>
          </div>
          <button className="btn btn-outline btn-sm" onClick={()=>window.print()}>🖨️ Print Kitchen QR</button>
        </div>
      )}
    </div>
  );
}


// ─── CUSTOMER APP ─────────────────────────────────────────────────────
function CustomerApp({table, restaurantId, fromQR, onBack}){
  const [toast,showToast]=useToast();
  const [menu,setMenu]=useState([]);
  const [menuLoad,setMenuLoad]=useState(true);
  const [activeCat,setActiveCat]=useState("All");
  const [cart,setCart]=useState({});
  const [cartOpen,setCartOpen]=useState(false);
  const [phase,setPhase]=useState("menu");
  const [orderId,setOrderId]=useState(null);
  const [liveOrder,setLiveOrder]=useState(null);
  const [sessionOrders,setSessionOrders]=useState([]);
  const [upiId,setUpiId]=useState("");
  const [payDone,setPayDone]=useState(false);
  const [paying,setPaying]=useState(false);

  useEffect(()=>{
    (restaurantId?dbMenuScoped(restaurantId):dbMenu()).then(m=>{setMenu(m);setMenuLoad(false);});
    // Fetch restaurant profile to get UPI ID for payment
    if(restaurantId){
      sb.from("restaurants")
        .select("upi_id")
        .eq("id", restaurantId)
        .single()
        .then(({data, error})=>{
          if(error) console.warn("UPI fetch error:", error.message);
          if(data?.upi_id) setUpiId(data.upi_id);
        });
    }
  },[restaurantId]);

  // Realtime subscription for THIS order's status
  useEffect(()=>{
    if(phase!=="tracking"||!orderId) return;
    const ch=sb.channel("order-"+orderId)
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"orders",filter:`id=eq.${orderId}`},
        payload=>setLiveOrder(p=>({...p,...payload.new,table:payload.new.table_num})))
      .subscribe();
    return ()=>sb.removeChannel(ch);
  },[phase,orderId]);

  const [searchHighlight,setSearchHighlight]=useState(null);
  const [hasOrdered,setHasOrdered]=useState(false);
  const [searchOpen,setSearchOpen]=useState(false);
  const [searchQuery,setSearchQuery]=useState("");
  const [typeFilter,setTypeFilter]=useState("all"); // "all" | "veg" | "nonveg"
  const [orderCounts,setOrderCounts]=useState({}); // {dishName: totalQtyOrdered}
  const itemRefs=useRef({});
  const searchInputRef=useRef(null);

  // Fetch order history to build popularity scores
  useEffect(()=>{
    if(!restaurantId) return;
    sb.from("orders")
      .select("items")
      .eq("restaurant_id", restaurantId)
      .then(({data})=>{
        if(!data) return;
        const counts={};
        data.forEach(order=>{
          (order.items||[]).forEach(item=>{
            const k=(item.name||"").toLowerCase().trim();
            counts[k]=(counts[k]||0)+(item.qty||1);
          });
        });
        setOrderCounts(counts);
      });
  },[restaurantId]);

  // Quick-add items — hardcoded essentials (shown after order placed)
  const QUICK_ITEMS=[
    {id:"q-roti",  name:"Roti",        emoji:"🫓", price:40,  type:"veg"},
    {id:"q-rice",  name:"Steamed Rice",emoji:"🍚", price:80,  type:"veg"},
    {id:"q-water", name:"Water Bottle",emoji:"💧", price:30,  type:"veg"},
    {id:"q-butter",name:"Butter Naan", emoji:"🫓", price:60,  type:"veg"},
    {id:"q-dal",   name:"Dal Tadka",   emoji:"🫘", price:180, type:"veg"},
  ];
  // Map quick items against actual menu — use real menu item if name matches
  function getQuickItem(qi){
    const real = menu.find(m=>m.name.toLowerCase().includes(qi.name.toLowerCase().split(" ")[0]));
    return real ? {...real, _quick:true} : {...qi, id: qi.id, available:true, _quick:true};
  }
  const cats=["All","Starter","Main Course","Drinks","Dessert","Roti & Rice"];
  // For "Roti & Rice" tab — show bread, rice, water items from menu + hardcoded fallbacks
  const ROTI_RICE_KEYWORDS=["roti","naan","rice","paratha","bread","puri","kulcha","bhatura","water","laccha","chapati","phulka","missi"];
  const rotiRiceItems = menu.filter(m=>m.available && ROTI_RICE_KEYWORDS.some(k=>m.name.toLowerCase().includes(k)));
  const ROTI_RICE_DEFAULTS=[
    {id:"rr-roti",  name:"Tandoori Roti",  emoji:"🫓",price:40, type:"veg",description:"Whole-wheat flatbread baked in tandoor",available:true},
    {id:"rr-naan",  name:"Butter Naan",    emoji:"🫓",price:70, type:"veg",description:"Soft leavened bread brushed with butter",available:true},
    {id:"rr-rice",  name:"Steamed Rice",   emoji:"🍚",price:80, type:"veg",description:"Long-grain basmati rice steamed to perfection",available:true},
    {id:"rr-jrice", name:"Jeera Rice",     emoji:"🍚",price:120,type:"veg",description:"Basmati rice tempered with cumin seeds",available:true},
    {id:"rr-water", name:"Water Bottle",   emoji:"💧",price:30, type:"veg",description:"500ml chilled mineral water",available:true},
    {id:"rr-papad", name:"Papad",          emoji:"🥞",price:30, type:"veg",description:"Crispy roasted papad",available:true},
  ];
  // Use real menu items if exist, otherwise show defaults (filtered to avoid duplicates)
  const rotiRiceVisible = rotiRiceItems.length>0
    ? rotiRiceItems
    : ROTI_RICE_DEFAULTS;
  const _sq = searchQuery.trim().toLowerCase();

  // Popularity score for a menu item
  function popScore(item){
    return orderCounts[(item.name||"").toLowerCase().trim()] || 0;
  }

  // Badge for a dish based on its rank within its category
  function dishBadge(item, rankInCat){
    const score = popScore(item);
    if(score===0) return null;
    if(rankInCat===0 && score>=5) return "hot";      // #1 in category with 5+ orders
    if(rankInCat<=1 && score>=3) return "trending";  // top 2 with 3+ orders
    return null;
  }

  // Base list before type filter
  const _base = _sq
    ? menu.filter(m=>m.available&&(
        m.name.toLowerCase().includes(_sq)||
        (m.description||"").toLowerCase().includes(_sq)||
        m.category.toLowerCase().includes(_sq)))
    : activeCat==="Roti & Rice"
      ? rotiRiceVisible
      : (activeCat==="All"?menu:menu.filter(m=>m.category===activeCat)).filter(m=>m.available);

  // Apply veg/nonveg filter
  const _typed = typeFilter==="all"
    ? _base
    : _base.filter(m=>(m.type||"veg")===(typeFilter==="veg"?"veg":"nonveg"));

  // Sort by popularity (highest ordered first within each category group)
  const visible = [..._typed].sort((a,b)=>popScore(b)-popScore(a));

  // For badge calculation — per-category rank after sorting
  const _catRanks={};
  visible.forEach((item,i)=>{
    const cat=item.category||"";
    if(_catRanks[cat]===undefined) _catRanks[cat]=0;
    else _catRanks[cat]++;
  });
  // rebuild per-cat index for badge
  const _catIdx={};
  const _visWithRank = visible.map(item=>{
    const cat=item.category||"";
    if(_catIdx[cat]===undefined) _catIdx[cat]=0;
    const rank=_catIdx[cat];
    _catIdx[cat]++;
    return {...item, _rank:rank, _badge:dishBadge(item,rank)};
  });

  function handleCustSearch(item){
    // Switch to the item's category and scroll to it
    setActiveCat(item.category);
    setSearchHighlight(item.id);
    setTimeout(()=>{
      const el=itemRefs.current[item.id];
      if(el) el.scrollIntoView({behavior:"smooth",block:"center"});
      setTimeout(()=>setSearchHighlight(null),700);
    },80);
  }
  const cartItems=Object.entries(cart).map(([id,qty])=>({...menu.find(m=>m.id===parseInt(id)),qty})).filter(Boolean);
  const cartTotal=cartItems.reduce((s,i)=>s+i.price*i.qty,0);
  const cartCount=Object.values(cart).reduce((s,v)=>s+v,0);

  function addToCart(id){setCart(p=>({...p,[id]:(p[id]||0)+1}));showToast("Added to cart!");}
  function setQty(id,qty){if(qty<=0){const n={...cart};delete n[id];setCart(n);}else setCart(p=>({...p,[id]:qty}));}

  async function placeOrder(){
    if(!cartItems.length) return;
    setPhase("placing");
    const newId=uid();
    const order={id:newId,table,items:cartItems.map(i=>({id:i.id,name:i.name,price:i.price,qty:i.qty})),total:cartTotal,status:"pending"};
    try{
      restaurantId ? await dbInsertOrderScoped(order, restaurantId) : await dbInsertOrder(order);
      setOrderId(newId);
      setLiveOrder({...order,table_num:table,created_at:new Date().toISOString()});
      // Append to session bill — never overwrites previous orders
      setSessionOrders(prev=>[...prev,{
        id:newId,
        items:cartItems.map(i=>({...i})),
        total:cartTotal,
        time:new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})
      }]);
      setHasOrdered(true);
      setCart({});setCartOpen(false);setPhase("tracking");
      showToast("Order placed! Kitchen will see it instantly.");
    }catch(e){
      showToast("Failed to place order. Please try again.");
      setPhase("menu");
    }
  }

  if(phase==="placing") return(
    <div className="cust-wrap">
      <div className="cust-nav"><div className="cust-nav-inner"><span className="cust-brand">Table<span>Tap</span></span><div><div className="cust-tbl-tag">📍 {"Table"} {table}</div></div></div></div>
      <div style={{padding:"60px 20px",textAlign:"center"}}><Spin/><div style={{color:"var(--cm)",fontSize:13,marginTop:8}}>{"Placing your order…"}</div></div>
    </div>
  );

  if(phase==="tracking"){
    const o=liveOrder||{status:"pending"};
    const STEPS=["pending","preparing","ready","delivered"];
    const cur=STEPS.indexOf(o.status);
    const INFO=[
      {icon:"📋",label:"Order Received", sub:"Your order is confirmed"},
      {icon:"👨‍🍳",label:"Being Prepared", sub:"The kitchen is on it!"},
      {icon:"🔔",label:"Ready to Serve",  sub:"Your food is ready!"},
      {icon:"✅",label:"Delivered",      sub:"Enjoy your meal! 🍽️"},
    ];

    // Grand total across all orders this session
    const grandTotal = sessionOrders.reduce((s,o)=>s+o.total, 0);

    // UPI deep link — opens GPay / PhonePe / Paytm / any UPI app
    function handlePay(){
      if(!upiId) return;
      setPaying(true);
      const note  = encodeURIComponent("Table "+table+" Order");
      const rname = encodeURIComponent("Restaurant");
      const upiUrl= `upi://pay?pa=${encodeURIComponent(upiId)}&pn=${rname}&am=${grandTotal.toFixed(2)}&cu=INR&tn=${note}`;
      // Open UPI intent — on mobile this pops the app chooser (GPay, PhonePe etc.)
      window.location.href = upiUrl;
      // After 1.5s show confirmation screen
      // (user is in their UPI app right now)
      setTimeout(()=>{ setPaying(false); setPayDone("pending"); }, 1500);
    }

    return(
      <div className="cust-wrap">
        {toast&&<Toast msg={toast}/>}
        <div className="cust-nav"><div className="cust-nav-inner"><span className="cust-brand">Table<span>Tap</span></span><div><div className="cust-tbl-tag">📍 {"Table"} {table}</div></div></div></div>
        <div style={{maxWidth:480,margin:"0 auto",padding:"20px 14px 60px"}}>

          {/* Payment success banner */}
          {payDone===true&&(
            <div className="pay-success">
              <div className="pay-success-icon">✅</div>
              <div className="pay-success-title">Payment Successful!</div>
              <div className="pay-success-sub">Thank you! Your payment of {fmt(grandTotal)} has been received.<br/>Enjoy your meal 🍽️</div>
            </div>
          )}

          {/* Latest order status card */}
          <div className="track-card" style={{marginBottom:14}}>
            <span className="track-icon">{INFO[Math.max(0,cur)].icon}</span>
            <div className="track-title">{INFO[Math.max(0,cur)].label}</div>
            <div className="track-sub">{INFO[Math.max(0,cur)].sub}</div>
            <SBadge status={o.status}/>
            <div className="track-oid">{"Order #"}{orderId}</div>
            <div className="timeline">
              {INFO.map((s,i)=>(
                <div key={i} className="tl-step">
                  <div className={`tl-dot ${i<cur?"done":i===cur?"active":""}`}>{i<cur?"✓":s.icon}</div>
                  <div className="tl-info">
                    <div className={`tl-label ${i<=cur?"":"dim"}`}>{s.label}</div>
                    {i===cur&&<div className="tl-sub">{s.sub}</div>}
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Cumulative session bill — all orders */}
          {sessionOrders.length>0&&(
            <div className="bill-card">
              <div className="bill-header">
                <div className="bill-title">🧾 Your Bill</div>
                <div className="bill-badge">{sessionOrders.length} order{sessionOrders.length>1?"s":""}</div>
              </div>

              {/* Each order as a block */}
              {sessionOrders.map((ord,oi)=>(
                <div key={ord.id} className="bill-order-block">
                  <div className="bill-order-label">
                    <span>Order {oi+1}</span>
                    <span style={{fontWeight:500,textTransform:"none",letterSpacing:0,color:"#C4A882"}}>{ord.time}</span>
                  </div>
                  {ord.items.map((item,ii)=>(
                    <div key={ii} className="bill-item-row">
                      <span className="bill-item-name">{item.name}</span>
                      <span className="bill-item-qty">×{item.qty}</span>
                      <span className="bill-item-amt">{fmt(item.price*item.qty)}</span>
                    </div>
                  ))}
                  <div style={{display:"flex",justifyContent:"flex-end",marginTop:4,paddingTop:4,borderTop:"1px solid #F5EDE2"}}>
                    <span style={{fontSize:12,color:"#9C8060",marginRight:8}}>Subtotal</span>
                    <span style={{fontSize:13,fontWeight:700,color:"#1C1108"}}>{fmt(ord.total)}</span>
                  </div>
                  {oi<sessionOrders.length-1&&<hr className="bill-divider"/>}
                </div>
              ))}

              {/* Grand total */}
              <hr className="bill-divider"/>
              <div className="bill-total-row">
                <span className="bill-total-label">Grand Total</span>
                <span className="bill-total-amt">{fmt(grandTotal)}</span>
              </div>

              {/* ── Payment area ── */}
              <div style={{marginTop:18}}>

                {/* Not yet paid — show UPI button */}
                {!payDone&&upiId&&(
                  <>
                    <button className="pay-btn" onClick={handlePay} disabled={paying}>
                      {paying?(
                        <span>Opening your UPI app…</span>
                      ):(
                        <>
                          <span style={{fontSize:22}}>₹</span>
                          <span>Pay {fmt(grandTotal)} via UPI</span>
                        </>
                      )}
                    </button>
                    <div style={{marginTop:10,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                      <span style={{fontSize:13,color:"#9C8060"}}>Opens</span>
                      {["GPay","PhonePe","Paytm","Any UPI"].map(a=>(
                        <span key={a} style={{fontSize:11,fontWeight:700,color:"#9C8060",background:"#F7F0E8",padding:"3px 10px",borderRadius:20,border:"1px solid #E8D9C4"}}>{a}</span>
                      ))}
                    </div>
                  </>
                )}

                {/* No UPI set — cash fallback */}
                {!payDone&&!upiId&&(
                  <div style={{padding:"16px",background:"#F7F0E8",borderRadius:14,textAlign:"center"}}>
                    <div style={{fontSize:28,marginBottom:6}}>💵</div>
                    <div style={{fontWeight:700,fontSize:15,color:"#1C1108",marginBottom:3}}>Pay at Counter</div>
                    <div style={{fontSize:13,color:"#9C8060"}}>Please pay {fmt(grandTotal)} at the billing counter</div>
                    {restaurantId&&<div style={{fontSize:10,color:"#C4A882",marginTop:8}}>
                      UPI not configured — run SQL in Supabase to add upi_id column, then enter your UPI ID in Admin → Settings
                    </div>}
                  </div>
                )}

                {/* Confirm screen — shown after UPI app redirect */}
                {payDone==="pending"&&(
                  <div>
                    <div style={{background:"linear-gradient(135deg,#FEF9C3,#FEF3C7)",border:"1.5px solid #FCD34D",borderRadius:14,padding:"16px",marginBottom:12,textAlign:"center"}}>
                      <div style={{fontSize:28,marginBottom:6}}>📲</div>
                      <div style={{fontWeight:700,fontSize:15,color:"#92400E",marginBottom:4}}>Did you complete the payment?</div>
                      <div style={{fontSize:12,color:"#B45309"}}>Check your GPay / PhonePe / Paytm for confirmation</div>
                    </div>
                    <div style={{display:"flex",gap:10}}>
                      <button onClick={()=>{
                        setPayDone(true);
                        // broadcast payment to kitchen notify
                        if(restaurantId){
                          try{
                            sb.channel("pay-notify-"+restaurantId).send({
                              type:"broadcast",event:"payment_done",
                              payload:{table,amount:grandTotal}
                            });
                          }catch(e){}
                        }
                      }}
                        style={{flex:1,padding:"14px",background:"linear-gradient(135deg,#16A34A,#22C55E)",color:"#fff",border:"none",borderRadius:14,fontSize:15,fontWeight:800,cursor:"pointer",boxShadow:"0 4px 14px rgba(22,163,74,.3)"}}>
                        ✓ Yes, Paid!
                      </button>
                      <button onClick={()=>{setPayDone(false);setPaying(false);}}
                        style={{flex:1,padding:"14px",background:"#F7F0E8",color:"#9C8060",border:"1.5px solid #E8D9C4",borderRadius:14,fontSize:14,fontWeight:600,cursor:"pointer"}}>
                        ↩ Try Again
                      </button>
                    </div>
                  </div>
                )}

                {/* Paid confirmation */}
                {payDone===true&&(
                  <div style={{background:"linear-gradient(135deg,#F0FDF4,#DCFCE7)",border:"1.5px solid #86EFAC",borderRadius:14,padding:"18px",textAlign:"center"}}>
                    <div style={{fontSize:32,marginBottom:6}}>✅</div>
                    <div style={{fontWeight:800,fontSize:16,color:"#15803D",marginBottom:3}}>Payment Confirmed!</div>
                    <div style={{fontSize:13,color:"#16A34A"}}>Thank you · {fmt(grandTotal)} paid</div>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* Order More button */}
          {payDone!==true&&(
            <button style={{width:"100%",padding:"16px",background:"linear-gradient(135deg,#D97706,#F59E0B)",color:"#fff",border:"none",borderRadius:"18px",fontSize:16,fontWeight:800,cursor:"pointer",fontFamily:"'Inter',sans-serif",boxShadow:"0 6px 24px rgba(217,119,6,.35)",letterSpacing:".01em",marginBottom:10}} onClick={()=>{setPhase("menu");setTimeout(()=>setActiveCat("Roti & Rice"),80);}}>{"+ Order More Items"}</button>
          )}
        </div>

        {cartCount>0&&(
          <div className="cart-bar-fixed" onClick={()=>{setPhase("menu");setTimeout(()=>setCartOpen(true),100);}}>
            <div className="cart-bar-inner">
              <div className="cart-bar-label"><div className="cart-dot">{cartCount}</div>{"Add to Order"}</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span className="cart-bar-total">{fmt(cartTotal)}</span>
                <span className="cart-bar-arrow">›</span>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  // Full-screen search results
  const allAvailable = menu.filter(m=>m.available);
  const searchResults = searchQuery.trim().length>0
    ? allAvailable.filter(m=>{
        const q=searchQuery.toLowerCase();
        return m.name.toLowerCase().includes(q)||
               (m.description||"").toLowerCase().includes(q)||
               (m.category||"").toLowerCase().includes(q);
      }).slice(0,20)
    : [];
  const popularNames=["Butter Chicken","Paneer Tikka","Biryani","Dal Makhani","Naan","Lassi"];

  return(
    <div className="cust-wrap">
      {toast&&<Toast msg={toast}/>}

      {/* Full-screen search overlay */}
      {searchOpen&&(
        <div className="search-overlay" onClick={e=>{if(e.target.className==="search-overlay"){setSearchOpen(false);setSearchQuery("");}}}>
          <div className="search-overlay-box">
            <div className="search-overlay-row">
              <span style={{padding:"0 14px",fontSize:16,color:"#C4A882"}}>🔍</span>
              <input
                ref={searchInputRef}
                className="search-overlay-input"
                placeholder={"Search the menu…"}
                value={searchQuery}
                onChange={e=>setSearchQuery(e.target.value)}
                autoFocus
              />
              {searchQuery&&<button onClick={()=>setSearchQuery("")} style={{background:"none",border:"none",padding:"0 10px",fontSize:18,color:"#9C8060",cursor:"pointer"}}>×</button>}
              <button className="search-overlay-cancel" onClick={()=>{setSearchOpen(false);setSearchQuery("");}}>Cancel</button>
            </div>
          </div>
          <div className="search-overlay-results">
            {searchQuery.trim()===0&&(
              <div className="search-popular">
                <div className="search-popular-title">{"🔥 Popular searches"}</div>
                {popularNames.map(n=>(
                  <span key={n} className="search-popular-pill" onClick={()=>setSearchQuery(n)}>{n}</span>
                ))}
              </div>
            )}
            {searchQuery.trim()&&searchResults.length===0&&(
              <div className="search-empty">😕 {"No dishes found for"} "{searchQuery}"</div>
            )}
            {searchResults.map(item=>(
              <div key={item.id} className="search-result-item" onClick={()=>{
                setSearchOpen(false);setSearchQuery("");
                handleCustSearch(item);
              }}>
                {item.image_url
                  ?<img src={item.image_url} alt={item.name} className="search-result-img" loading="lazy"/>
                  :<div className="search-result-emoji">{item.emoji||"🍽️"}</div>
                }
                <div style={{flex:1,minWidth:0}}>
                  <div className="search-result-name">
                    {(()=>{
                      const dn=item.name;
                      const q=searchQuery.trim();
                      if(!q) return dn;
                      const idx=dn.toLowerCase().indexOf(q.toLowerCase());
                      if(idx<0) return dn;
                      return <span>{dn.slice(0,idx)}<mark>{dn.slice(idx,idx+q.length)}</mark>{dn.slice(idx+q.length)}</span>;
                    })()}
                  </div>
                  <div className="search-result-meta">{catLabel(lang_,item.category)} · {fmt(item.price)}</div>
                </div>
                <span style={{fontSize:8,color:"#9C8060"}}>›</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="cust-nav">
        <div className="cust-nav-inner">
          <span className="cust-brand">Table<span>Tap</span></span>
          <div><div className="cust-tbl-tag">📍 {"Table"} {table}</div></div>
          <div className="cust-tagline">{"Scan · Order · Enjoy"}</div>
        </div>
      </div>

      {/* ── Sticky top bar: search + categories ── */}
      <div style={{position:"sticky",top:0,zIndex:20,background:"#F7F0E8"}}>
        {/* Search bar */}
        <div className="cust-search-wrap">
          <div className="cust-search-row">
            <span className="cust-search-icon">🔍</span>
            <input
              className="cust-search-input"
              placeholder="Search the menu…"
              value={searchQuery}
              onChange={e=>setSearchQuery(e.target.value)}
              autoComplete="off"
            />
            {searchQuery&&(
              <button className="cust-search-clear" onClick={()=>setSearchQuery("")}>×</button>
            )}
          </div>
        </div>

        {/* Category pills */}
        <div className="cat-bar" style={{position:"relative",top:"auto"}}>
          {cats.map(cat=>(
            <button
              key={cat}
              className={`cat-btn ${activeCat===cat?"on":""}${cat==="Roti & Rice"&&hasOrdered&&activeCat!=="Roti & Rice"?" roti-rice-glow":""}`}
              onClick={()=>{setActiveCat(cat);setSearchQuery("");}}
            >
              {cat==="Roti & Rice"?"🍞 Roti & Rice":cat}
            </button>
          ))}
        </div>

        {/* Veg / Non-veg filter — only when not searching */}
        {!_sq&&(
          <div className="type-filter-bar">
            <button className={`type-pill ${typeFilter==="all"?"all-on":""}`}
              onClick={()=>setTypeFilter("all")}>All</button>
            <button className={`type-pill ${typeFilter==="veg"?"veg-on":""}`}
              onClick={()=>setTypeFilter("veg")}>
              <span className="type-dot" style={{background:"#16A34A"}}/>
              Veg
            </button>
            <button className={`type-pill ${typeFilter==="nonveg"?"nonveg-on":""}`}
              onClick={()=>setTypeFilter("nonveg")}>
              <span className="type-dot" style={{background:"#DC2626"}}/>
              Non-Veg
            </button>
          </div>
        )}
      </div>
      <div className="cust-items">
        {!fromQR&&onBack&&<button className="btn btn-outline btn-sm" style={{marginBottom:12}} onClick={onBack}>← Back</button>}
        {menuLoad&&<Spin/>}
        {!menuLoad&&_visWithRank.length===0&&(
          <div style={{textAlign:"center",padding:"48px 20px",color:"#9C8060"}}>
            <div style={{fontSize:48,marginBottom:12}}>{_sq?"😕":"🍽️"}</div>
            <div style={{fontWeight:600,fontSize:16,color:"#1C1108",marginBottom:4}}>
              {_sq?`No dishes found for "${searchQuery}"`:"Nothing here yet"}
            </div>
            <div style={{fontSize:13}}>
              {_sq?"Try a different word":" No dishes available in this category"}
            </div>
            {_sq&&<button onClick={()=>setSearchQuery("")} style={{marginTop:14,padding:"8px 20px",borderRadius:20,border:"1.5px solid #E8D9C4",background:"#fff",fontSize:13,color:"#9C8060",cursor:"pointer",fontFamily:"'Inter',sans-serif"}}>Clear search</button>}
          </div>
        )}
        {_visWithRank.map(item=>{
          const qty=cart[item.id]||0;
          return(
            <div key={item.id} ref={el=>itemRefs.current[item.id]=el} className={`cust-item ${searchHighlight===item.id?"flash":""}`}>
              {/* Left: image or emoji */}
              <div className="cust-item-img-wrap">
                {item.image_url
                  ?<img src={item.image_url} alt={item.name} loading="lazy"/>
                  :<div className="cust-item-img">{item.emoji||"🍽️"}</div>
                }
                {item.type&&<div className="cust-item-type-dot" style={{background:item.type==="veg"?"#16A34A":"#DC2626"}} title={item.type==="veg"?"Veg":"Non-Veg"}/>}
              </div>
              {/* Right: info */}
              <div className="cust-item-info">
                {/* Hot / Trending badge */}
                {item._badge==="hot"&&<span className="cust-badge hot">🔥 Hot</span>}
                {item._badge==="trending"&&<span className="cust-badge trending">📈 Trending</span>}
                <div className="cust-item-name">{item.name}</div>
                <div className="cust-item-desc">{(item.description||"")}</div>
                <div className="cust-item-bottom">
                  <span className="cust-item-price">{fmt(item.price)}</span>
                  {qty===0
                    ?<button className="add-btn" onClick={()=>addToCart(item.id)}>{"Add +"}</button>
                    :<div className="qty-row">
                       <button className="qty-btn" onClick={()=>setQty(item.id,qty-1)}>−</button>
                       <span className="qty-n">{qty}</span>
                       <button className="qty-btn" onClick={()=>setQty(item.id,qty+1)}>+</button>
                     </div>
                  }
                </div>
              </div>
            </div>
          );
        })}
      </div>



      {cartCount>0&&!cartOpen&&(
        <div className="cart-bar-fixed" onClick={()=>setCartOpen(true)}>
          <div className="cart-bar-inner">
            <div className="cart-bar-label"><div className="cart-dot">{cartCount}</div>{"View Cart"}</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span className="cart-bar-total">{fmt(cartTotal)}</span>
              <span className="cart-bar-arrow">›</span>
            </div>
          </div>
        </div>
      )}

      {cartOpen&&(
        <div className="cart-panel">
          <div className="cart-handle"/>
          <div className="cart-head">
            <span className="cart-head-title">{"Your Cart"}</span>
            <button className="cart-close" onClick={()=>setCartOpen(false)}>✕</button>
          </div>
          <div className="cart-body">
            {cartItems.map(item=>(
              <div key={item.id} className="cart-row">
                <div className="cart-item-thumb">
                  {item.image_url?<img src={item.image_url} alt={item.name} loading="lazy"/>:(item.emoji||"🍽️")}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div className="cart-item-name">{item.name}</div>
                  <div className="cart-item-sub">{fmt(item.price)} {"each"}</div>
                </div>
                <div className="cart-row-controls">
                  <div className="qty-row">
                    <button className="qty-btn" onClick={()=>setQty(item.id,item.qty-1)}>−</button>
                    <span className="qty-n">{item.qty}</span>
                    <button className="qty-btn" onClick={()=>setQty(item.id,item.qty+1)}>+</button>
                  </div>
                  <span className="cart-item-total">{fmt(item.price*item.qty)}</span>
                </div>
              </div>
            ))}
          </div>
          <div className="cart-foot">
            <hr className="cart-divider"/>
            <div className="cart-summary-row total">
              <span className="cart-summary-label">{"Total Amount"}</span>
              <span className="cart-summary-total">{fmt(cartTotal)}</span>
            </div>
            <button className="place-btn" onClick={placeOrder}>{"🛒 Place Order"} · {fmt(cartTotal)}</button>
          </div>
        </div>
      )}
    </div>
  );
}

// PEXELS IMAGE FETCHER  — cached to avoid repeat API calls
// ═══════════════════════════════════════════════════════════════
const _imgCache = {};
async function fetchDishImages(dishName){
  const key = dishName.toLowerCase();
  if(_imgCache[key]) return _imgCache[key];
  if(!PEXELS_KEY) return [];
  try{
    const q = encodeURIComponent(dishName + " indian food dish restaurant");
    const res = await fetch(`https://api.pexels.com/v1/search?query=${q}&per_page=3&orientation=landscape`,{
      headers:{Authorization: PEXELS_KEY}
    });
    const data = await res.json();
    const urls = (data.photos||[]).map(p=>p.src.medium);
    _imgCache[key] = urls;
    return urls;
  }catch(e){ return []; }
}

// SMART MENU BUILDER COMPONENT
// ═══════════════════════════════════════════════════════════════
function SmartMenuBuilder({menu, setMenu, showToast, userId}){
  const [query,   setQuery]   = useState("");
  const [open,    setOpen]    = useState(false);
  const [focused, setFocused] = useState(-1);
  const [draft,   setDraft]   = useState(null);   // selected dish being edited
  const [images,  setImages]  = useState([]);       // pexels suggestions
  const [imgLoad, setImgLoad] = useState(false);
  const [selImg,  setSelImg]  = useState("");       // chosen image url
  const [saving,  setSaving]  = useState(false);
  const [customImg, setCustomImg] = useState("");   // user-uploaded base64
  const wrapRef = useRef(null);
  const fileRef = useRef(null);

  // Filter dataset
  const results = query.trim().length < 1 ? [] : DISH_DATASET
    .map(d=>{
      const n=d.name.toLowerCase(), q=query.trim().toLowerCase();
      let s=0;
      if(n===q) s=100;
      else if(n.startsWith(q)) s=80;
      else if(n.includes(q)) s=60;
      else if((d.description||"").toLowerCase().includes(q)) s=30;
      return s>0?{...d,_s:s}:null;
    })
    .filter(Boolean).sort((a,b)=>b._s-a._s).slice(0,8);

  // Close dropdown on outside click
  useEffect(()=>{
    function h(e){if(wrapRef.current&&!wrapRef.current.contains(e.target)){setOpen(false);setFocused(-1);}}
    document.addEventListener("mousedown",h);
    return ()=>document.removeEventListener("mousedown",h);
  },[]);

  function handleKey(e){
    if(!open||!results.length) return;
    if(e.key==="ArrowDown"){e.preventDefault();setFocused(f=>Math.min(f+1,results.length-1));}
    else if(e.key==="ArrowUp"){e.preventDefault();setFocused(f=>Math.max(f-1,0));}
    else if(e.key==="Enter"&&focused>=0){e.preventDefault();pickDish(results[focused]);}
    else if(e.key==="Escape"){setOpen(false);setFocused(-1);}
  }

  function pickDish(dish){
    setQuery(""); setOpen(false); setFocused(-1);
    setDraft({
      name:        dish.name,
      category:    dish.category,
      type:        dish.type,
      description: dish.description,
      price:       dish.default_price_inr,
      emoji:       dish.emoji||"🍽️",
      available:   true,
      image_url:   ""
    });
    setSelImg(""); setCustomImg(""); setImages([]);
    // Fetch images
    setImgLoad(true);
    fetchDishImages(dish.name).then(urls=>{
      setImages(urls);
      if(urls.length>0) setSelImg(urls[0]);
      setImgLoad(false);
    });
  }

  function handleFileUpload(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => { setCustomImg(ev.target.result); setSelImg(ev.target.result); };
    reader.readAsDataURL(file);
  }

  async function addToMenu(){
    if(!draft||!draft.name||!draft.price) return;
    setSaving(true);
    const item = {...draft, price:parseFloat(draft.price), image_url: selImg||""};
    try{
      const saved = userId
        ? await dbUpsertItemScoped(item, userId)
        : await dbUpsertItem(item);
      setMenu(p=>[...p, saved]);
      showToast("✓ "+draft.name+" added to menu!");
      setDraft(null); setSelImg(""); setImages([]);
    }catch(e){
      console.error("dbUpsertItem error:",e);
      const msg = e?.message||"";
      if(msg.includes("column")||msg.includes("schema")) showToast("DB needs update — run the SQL in setup screen");
      else showToast("Error: "+msg.slice(0,60));
    }
    setSaving(false);
  }

  const vegCount    = menu.filter(m=>m.type==="veg").length;
  const nonvegCount = menu.filter(m=>m.type==="nonveg").length;

  return(
    <div className="smb-wrap">
      {/* Hero banner */}
      <div className="smb-hero">
        <div className="smb-hero-text">
          <h2>⚡ Smart Menu Builder</h2>
          <p>Search from 60+ Indian dishes and add to your menu instantly.<br/>Auto-fills name, description, price and fetches food images.</p>
        </div>
        <div className="smb-hero-badge">312 dishes · Build menu in 2 min</div>
      </div>

      {/* Quick stats */}
      <div className="smb-stats">
        <div className="smb-stat"><div className="smb-stat-n">{menu.length}</div><div className="smb-stat-l">Total Items</div></div>
        <div className="smb-stat"><div className="smb-stat-n" style={{color:"var(--grn)"}}>{vegCount}</div><div className="smb-stat-l">Veg Items</div></div>
        <div className="smb-stat"><div className="smb-stat-n" style={{color:"var(--red)"}}>{nonvegCount}</div><div className="smb-stat-l">Non-Veg Items</div></div>
        <div className="smb-stat"><div className="smb-stat-n">{menu.filter(m=>m.available).length}</div><div className="smb-stat-l">Available</div></div>
      </div>

      {/* Search box */}
      <div className="smb-search-box" ref={wrapRef}>
        <div className="smb-search-label">Search dish to add</div>
        <div style={{position:"relative"}}>
          <div className="smb-search-row">
            <span className="smb-search-icon">🔍</span>
            <input
              className="smb-search-input"
              placeholder="Type a dish name… e.g. paneer, biryani, lassi"
              value={query}
              onChange={e=>{setQuery(e.target.value);setOpen(true);setFocused(-1);}}
              onFocus={()=>{if(query.trim()) setOpen(true);}}
              onKeyDown={handleKey}
            />
            {query&&<button className="smb-search-clear" onClick={()=>{setQuery("");setOpen(false);}}>×</button>}
          </div>
          {open&&query.trim()&&(
            <div className="smb-dropdown">
              {results.length===0
                ?<div className="smb-no-results">No dishes match "{query}" — try a different name</div>
                :results.map((d,i)=>(
                  <div key={d.dish_id} className={`smb-suggestion ${i===focused?"focused":""}`} onMouseDown={()=>pickDish(d)}>
                    <div className="smb-sug-emoji">{d.emoji||"🍽️"}</div>
                    <div className="smb-sug-info">
                      <div className="smb-sug-name">
                        <HighlightMatch text={d.name} query={query}/>
                      </div>
                      <div className="smb-sug-meta">
                        <span>{d.category}</span>
                        <span className={`smb-type-${d.type}`}>{d.type==="veg"?"● Veg":"● Non-Veg"}</span>
                      </div>
                    </div>
                    <div className="smb-sug-price">{fmt(d.default_price_inr)}</div>
                  </div>
                ))
              }
            </div>
          )}
        </div>
        {!query&&<div style={{fontSize:12,color:"var(--am)",marginTop:8}}>Popular: Butter Chicken, Paneer Tikka, Biryani, Dal Makhani, Gulab Jamun…</div>}
      </div>

      {/* Auto-fill form panel */}
      {draft&&(
        <div className="smb-form-panel">
          <div className="smb-form-header">
            <div className="smb-form-emoji">{draft.emoji}</div>
            <div>
              <div className="smb-form-title">{draft.name}</div>
              <div className="smb-form-subtitle">

// STATION VIEW — kitchen staff interface, no login required
// URL: yoursite.html?station=tandoor&rid=RESTAURANT_UUID
// ═══════════════════════════════════════════════════════════════
function KitchenView({restaurantId, tableCountFromUrl=10}){
  const [orders,      setOrders]     = useState([]);
  const [loading,     setLoading]    = useState(true);
  const [tableCount,  setTableCount] = useState(tableCountFromUrl);
  const [selected,    setSelected]   = useState(null); // table number being viewed
  const [newTables,   setNewTables]  = useState(new Set()); // tables with fresh orders (blinking)
  const [toast,       showToast]     = useToast();
  const [payNotifs,   setPayNotifs]  = useState([]);

  // ── Load orders on mount ─────────────────────────────────────────────
  // tableCount comes from the QR URL (?tables=N) — no DB fetch needed
  useEffect(()=>{
    dbOrdersScoped(restaurantId).then(ordRes=>{
      const active = ordRes.filter(x=>x.status!=="delivered");
      setOrders(active);
      setLoading(false);
      // Blink all tables that already have pending orders
      const pendingTables = new Set(
        active.filter(o=>o.status==="pending").map(o=>o.table_num||o.table)
      );
      setNewTables(pendingTables);
    });
  },[restaurantId]);

  // ── Polling fallback every 3s (works even if Realtime not enabled) ──
  useEffect(()=>{
    const iv = setInterval(()=>{
      dbOrdersScoped(restaurantId).then(fresh=>{
        const active = fresh.filter(x=>x.status!=="delivered");
        setOrders(prev=>{
          // Find truly new orders (not in prev)
          const prevIds = new Set(prev.map(o=>o.id));
          const newOrds = active.filter(o=>!prevIds.has(o.id));
          if(newOrds.length>0){
            // Blink tables with new pending orders
            setNewTables(p=>{
              const n = new Set(p);
              newOrds.forEach(o=>{ if(o.status==="pending") n.add(o.table_num||o.table); });
              return n;
            });
          }
          // Always update if anything changed
          const same = JSON.stringify(prev.map(o=>o.id+o.status).sort()) ===
                       JSON.stringify(active.map(o=>o.id+o.status).sort());
          return same ? prev : active;
        });
      });
    },3000);
    return ()=>clearInterval(iv);
  },[restaurantId]);

  // ── Realtime (instant when Supabase realtime is enabled) ────────────
  useEffect(()=>{
    const ch = sb.channel("kt-orders-"+restaurantId)
      .on("postgres_changes",
        {event:"INSERT",schema:"public",table:"orders",filter:`restaurant_id=eq.${restaurantId}`},
        payload=>{
          const o = {...payload.new, table:payload.new.table_num};
          setOrders(prev=>prev.find(x=>x.id===o.id)?prev:[o,...prev].filter(x=>x.status!=="delivered"));
          // Blink this table
          setNewTables(prev=>new Set([...prev, payload.new.table_num]));
        }
      )
      .on("postgres_changes",
        {event:"UPDATE",schema:"public",table:"orders",filter:`restaurant_id=eq.${restaurantId}`},
        payload=>{
          setOrders(prev=>
            prev.map(o=>o.id===payload.new.id
              ? {...o,...payload.new,table:payload.new.table_num}
              : o
            ).filter(o=>o.status!=="delivered")
          );
        }
      )
      .subscribe();
    return ()=>sb.removeChannel(ch);
  },[restaurantId]);

  // Payment notifications
  useEffect(()=>{
    if(!restaurantId) return;
    const ch = sb.channel("pay-notify-"+restaurantId)
      .on("broadcast",{event:"payment_done"},payload=>{
        const {table,amount}=payload.payload||{};
        setPayNotifs(prev=>[{table,amount,id:Date.now()},...prev].slice(0,3));
      }).subscribe();
    return ()=>sb.removeChannel(ch);
  },[restaurantId]);

  async function advance(order){
    const next = order.status==="pending"?"preparing":order.status==="preparing"?"ready":"delivered";
    try{
      await dbUpdateStatus(order.id,next);
      setOrders(prev=>
        next==="delivered"
          ? prev.filter(o=>o.id!==order.id)
          : prev.map(o=>o.id===order.id?{...o,status:next}:o)
      );
      showToast("Table "+(order.table_num||order.table)+" → "+next);
    }catch(e){ showToast("Update failed"); }
  }

  // Re-add table to blinking if new pending order arrives while on detail view
  useEffect(()=>{
    if(selected===null) return;
    const hasPending = orders.some(o=>(o.table_num||o.table)===selected && o.status==="pending");
    // if orders came in for THIS table while viewing, re-blink won't happen here
    // but polling will catch new tables and grid will show blink when back
  },[orders, selected]);

  function minsAgo(ts){ return Math.floor((Date.now()-new Date(ts).getTime())/60000); }
  function timeLabel(ts){
    const m=minsAgo(ts);
    if(m<1) return "Just now";
    if(m<60) return m+"m ago";
    return Math.floor(m/60)+"h "+m%60+"m";
  }
  function urgency(ts){
    const m=minsAgo(ts);
    return m<8?"fresh":m<15?"mid":"old";
  }

  // Group orders by table
  function tableOrders(tbl){ return orders.filter(o=>(o.table_num||o.table)===tbl); }
  function tableStatus(tbl){
    const tOrders = tableOrders(tbl);
    if(!tOrders.length) return "idle";
    if(tOrders.some(o=>o.status==="pending"))   return "pending";
    if(tOrders.some(o=>o.status==="preparing")) return "preparing";
    return "ready";
  }

  // When chef opens a table — clear blink (will re-blink if new order arrives)
  function openTable(tbl){
    setSelected(tbl);
    setNewTables(prev=>{ const n=new Set(prev); n.delete(tbl); return n; });
  }

  // If a new order comes in while chef is viewing a different table, re-blink
  // (handled by polling and realtime setNewTables calls above)

  const tables = Array.from({length:tableCount},(_,i)=>i+1);

  // Detail view — orders for selected table
  if(selected!==null){
    const tOrders = tableOrders(selected).sort((a,b)=>{
      const r={pending:0,preparing:1,ready:2};
      return (r[a.status]??3)-(r[b.status]??3);
    });
    return(
      <div className="st-wrap">
        {toast&&<Toast msg={toast}/>}
        {/* Header */}
        <div className="st-nav">
          <button onClick={()=>setSelected(null)}
            style={{background:"none",border:"none",color:"#555",fontSize:22,cursor:"pointer",padding:"0 8px 0 0",lineHeight:1}}>
            ←
          </button>
          <div style={{flex:1}}>
            <div className="st-nav-brand">Table <span style={{color:"#D97706"}}>{selected}</span></div>
            <div className="st-station-label">{tOrders.length} order{tOrders.length!==1?"s":""}</div>
          </div>
          <div className="st-nav-right">
            <div className="st-live-dot"/><span className="st-live-txt">Live</span>
          </div>
        </div>

        {tOrders.length===0?(
          <div className="st-empty">
            <div className="st-empty-icon">✅</div>
            <div className="st-empty-title">All clear</div>
            <div className="st-empty-sub">No active orders for Table {selected}</div>
          </div>
        ):(
          <div className="st-body">
            {tOrders.map(order=>{
              const urg=urgency(order.created_at);
              const btnLabel={pending:"▶ Start Preparing",preparing:"✓ Mark Ready",ready:"✓ Served"};
              return(
                <div key={order.id} className="st-order">
                  <div className="st-order-head">
                    <div>
                      <div className="st-table-label">STATUS</div>
                      <div style={{fontSize:16,fontWeight:700,color:"#111",marginTop:2}}>
                        {order.status==="pending"?"🔔 New Order":order.status==="preparing"?"🍳 Cooking":"✅ Ready"}
                      </div>
                    </div>
                    <div className="st-time-block">
                      <div className={`st-time-val ${urg}`}>{timeLabel(order.created_at)}</div>
                      <div className="st-order-id-txt">{order.id}</div>
                    </div>
                  </div>
                  <div className="st-items-list">
                    {order.items.map((item,i)=>(
                      <div key={i} className="st-item-row">
                        <div className="st-qty-badge">{item.qty}</div>
                        <div className="st-item-name-txt">{item.name}</div>
                      </div>
                    ))}
                  </div>
                  <div className="st-action-wrap">
                    <button className={`st-action-btn ${order.status}`} onClick={()=>advance(order)}>
                      {btnLabel[order.status]} — Table {selected}
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  // ── Compute grid columns so ALL tables fit on one screen ─────────────
  // Pick cols so rows × cols >= tableCount, with roughly square cells
  const cols = Math.ceil(Math.sqrt(tableCount));
  const rows = Math.ceil(tableCount / cols);
  // Grid fills remaining height after nav+summary (~110px)
  const gridStyle = {
    gridTemplateColumns: `repeat(${cols},1fr)`,
    gridTemplateRows:    `repeat(${rows},1fr)`,
    height: "100%",
  };

  // ── GRID VIEW — all tables ──────────────────────────────────────────
  return(
    <div className="st-wrap" style={{height:"100vh",overflow:"hidden"}}>
      {toast&&<Toast msg={toast}/>}

      {/* Nav */}
      <div className="st-nav">
        <div>
          <div className="st-nav-brand">Table<span style={{color:"#D97706",fontStyle:"italic"}}>Tap</span></div>
          <div className="st-station-label">👨‍🍳 Kitchen · {tableCount} tables</div>
        </div>
        <div className="st-nav-right">
          <div className="st-live-dot"/><span className="st-live-txt">Live</span>
        </div>
      </div>

      {/* Payment banners */}
      {payNotifs.map(n=>(
        <div key={n.id} className="st-pay-banner">
          <div className="st-pay-banner-icon">💰</div>
          <div className="st-pay-banner-text">
            <div className="st-pay-banner-title">Payment Received!</div>
            <div className="st-pay-banner-sub">Table {n.table} paid {n.amount?"₹"+Number(n.amount).toLocaleString("en-IN"):"the bill"}</div>
          </div>
          <button className="st-pay-banner-close" onClick={()=>setPayNotifs(p=>p.filter(x=>x.id!==n.id))}>✕</button>
        </div>
      ))}

      {/* Summary strip — compact */}
      <div style={{display:"flex",gap:6,padding:"8px 12px 4px",flexShrink:0}}>
        {[
          {label:"New",    count:orders.filter(o=>o.status==="pending").length,   color:"#111"},
          {label:"Cooking",count:orders.filter(o=>o.status==="preparing").length, color:"#D97706"},
          {label:"Ready",  count:orders.filter(o=>o.status==="ready").length,     color:"#16A34A"},
        ].map(s=>(
          <div key={s.label} style={{
            display:"flex",alignItems:"center",gap:4,padding:"4px 10px",
            borderRadius:8,background:"#fff",border:"1px solid #EBEBEB",
            fontSize:12,fontWeight:700,color:s.color,whiteSpace:"nowrap"
          }}>
            <span style={{fontSize:14}}>{s.count}</span>
            <span style={{color:"#AAA",fontWeight:500}}>{s.label}</span>
          </div>
        ))}
      </div>

      {/* Table grid — fills remaining screen, no scroll */}
      {loading?(
        <div className="st-empty">
          <div className="spinner" style={{width:36,height:36,borderWidth:3,borderTopColor:"#111",borderColor:"#E9ECEF"}}/>
          <div style={{color:"#999",fontSize:14,marginTop:14}}>Loading…</div>
        </div>
      ):(
        <div className="kt-grid" style={gridStyle}>
          {tables.map(tbl=>{
            const status     = tableStatus(tbl);
            const tOrds      = tableOrders(tbl);
            const isNew      = newTables.has(tbl);
            const orderCount = tOrds.length;

            const s = {
              idle:      {bg:"#F9F9F9",border:"#E9ECEF",num:"#CCC",   label:"",       lc:"#CCC"},
              pending:   {bg:"#fff",   border:"#111",   num:"#111",   label:"New",    lc:"#111"},
              preparing: {bg:"#FFFBF0",border:"#D97706",num:"#D97706",label:"Cooking",lc:"#D97706"},
              ready:     {bg:"#F0FDF4",border:"#16A34A",num:"#16A34A",label:"Ready",  lc:"#16A34A"},
            }[status];

            return(
              <button key={tbl}
                className={`kt-box${isNew?" kt-blink":""}`}
                style={{background:s.bg, borderColor:s.border}}
                onClick={()=>status!=="idle"&&openTable(tbl)}
                disabled={status==="idle"}
              >
                {orderCount>0&&<div className="kt-badge" style={{background:status==="ready"?"#16A34A":status==="preparing"?"#D97706":"#111"}}>{orderCount}</div>}
                <div className="kt-num" style={{color:s.num}}>{tbl}</div>
                <div className="kt-label" style={{color:s.lc}}>{status==="idle"?"free":s.label}</div>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
